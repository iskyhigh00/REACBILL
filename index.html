<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REACBILL — Seguimiento Billeteros</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Base */
  --bg:#080c14; --panel:#0d1524; --panel2:#121e33; --panel3:#182440;
  --border:#1e2d47; --border2:#263652;
  /* Text */
  --text:#e2e8f4; --muted:#6b7fa3; --muted2:#4a5a7a; --fg:#e2e8f4;
  /* Accent */
  --accent:#3b82f6; --accent2:#6366f1; --accent-glow:rgba(59,130,246,.25);
  --accent-hover:#60a5fa;
  /* Status */
  --ok:#10b981; --mid:#f59e0b; --high:#f97316; --crit:#ef4444;
  --bg-ok:rgba(16,185,129,.12); --bg-mid:rgba(245,158,11,.12);
  --bg-high:rgba(249,115,22,.12); --bg-crit:rgba(239,68,68,.12);
  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  /* Radius */
  --r:8px; --r-sm:5px; --r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

body{
  background:var(--bg);
  color:var(--text);
  font:13px/1.5 'Inter',system-ui,sans-serif;
  cursor:default;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%,rgba(59,130,246,.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 110%,rgba(99,102,241,.06),transparent);
  background-attachment:fixed;
}

/* ── Header ── */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(8,12,20,.85);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:10px 20px 0;
  box-shadow:0 1px 0 rgba(59,130,246,.1), var(--shadow);
}
header h1{
  font-size:15px;font-weight:700;letter-spacing:.5px;
  background:linear-gradient(135deg,#e2e8f4 0%,var(--accent-hover) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:inline-block;margin-right:8px;
}
.ver{color:var(--muted2);font-size:10px;font-weight:400;-webkit-text-fill-color:var(--muted2)}

#statsBar{
  font-size:11.5px;margin-top:4px;
  display:flex;flex-wrap:wrap;gap:16px;align-items:center;
}
#statsBar .sv{font-weight:600;color:var(--accent-hover)}
#statsBar .sl{color:var(--muted);font-size:10.5px}

#paramsBar{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:10.5px;
}
#paramsBar span{
  background:rgba(59,130,246,.08);
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;padding:2px 10px;
  color:var(--muted);
  transition:all .2s;
}
#paramsBar span:hover{border-color:var(--accent);color:var(--text)}
#paramsBar b{color:var(--accent-hover);font-weight:600}

/* ── Nav tabs ── */
nav{
  display:flex;flex-wrap:nowrap;gap:0;margin-top:10px;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-ms-overflow-style:none;
  border-bottom:none;
  padding-bottom:0;
}
nav::-webkit-scrollbar{display:none}
nav button{
  background:transparent;
  color:var(--muted);
  border:none;
  border-bottom:2px solid transparent;
  border-radius:0;
  padding:7px 14px;
  cursor:pointer;
  font:11.5px/1 'Inter',sans-serif;
  font-weight:500;
  white-space:nowrap;
  transition:color .2s, border-color .2s;
  letter-spacing:.2px;
}
nav button:hover{color:var(--text);border-bottom-color:var(--border2)}
nav button.active{
  color:var(--accent-hover);
  border-bottom-color:var(--accent);
  font-weight:600;
}

/* ── Main ── */
main{padding:18px 20px}
.tab{display:none}.tab.active{display:block}

/* ── Cards ── */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:16px 18px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card h2{
  font-size:12px;font-weight:600;
  margin-bottom:12px;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;
  display:flex;align-items:center;gap:7px;
}
.card h2::before{
  content:'';display:inline-block;
  width:3px;height:13px;
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  border-radius:2px;
}

/* ── KPI cards ── */
.kpis{display:flex;flex-wrap:wrap;gap:12px}
.kpi{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:14px 18px;min-width:120px;
  position:relative;overflow:hidden;
  transition:all .2s;
  box-shadow:var(--shadow-sm);
}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  opacity:.6;
}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.kpi .v{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.kpi .l{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* ── Tables ── */
table{border-collapse:collapse;font-size:11px;width:100%}
th,td{
  border:none;
  border-bottom:1px solid var(--border);
  padding:6px 8px;
  text-align:right;
  white-space:nowrap;
}
th{
  background:var(--panel3);
  top:0;position:sticky;z-index:3;
  user-select:none;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);
  padding:8px 8px;
}
th:first-child{border-radius:var(--r-sm) 0 0 0}
th:last-child{border-radius:0 var(--r-sm) 0 0}
td.left,th.left{text-align:left}
.tblWrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:var(--r);
  background:var(--panel);
}
tbody tr{transition:background .1s}
tbody tr:hover td{background:rgba(59,130,246,.06)}
tbody tr:last-child td{border-bottom:none}

/* ── Status colors ── */
.c-ok {background:var(--bg-ok)!important;color:#34d399;font-weight:600}
.c-mid{background:var(--bg-mid)!important;color:#fbbf24;font-weight:600}
.c-hi {background:var(--bg-high)!important;color:#fb923c;font-weight:600}
.c-cr {background:var(--bg-crit)!important;color:#f87171;font-weight:600}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;
  border-radius:20px;padding:2px 8px;
  font-size:10px;font-weight:600;
  letter-spacing:.3px;
}
.b-ok{background:rgba(16,185,129,.15);color:var(--ok);border:1px solid rgba(16,185,129,.3)}
.b-mid{background:rgba(245,158,11,.15);color:var(--mid);border:1px solid rgba(245,158,11,.3)}
.b-hi{background:rgba(249,115,22,.15);color:var(--high);border:1px solid rgba(249,115,22,.3)}
.b-cr{background:rgba(239,68,68,.15);color:var(--crit);border:1px solid rgba(239,68,68,.3)}

/* ── Sort ── */
th.sortable{cursor:pointer}
th.sortable:hover{color:var(--text);background:rgba(59,130,246,.1)}
th.s-asc::after{content:" ↑";font-size:9px;color:var(--accent)}
th.s-desc::after{content:" ↓";font-size:9px;color:var(--accent)}

/* ── Sticky cols ── */
.s1{position:sticky;left:0px;  z-index:4;background:var(--panel);min-width:76px;width:76px}
.s2{position:sticky;left:76px; z-index:4;background:var(--panel);min-width:70px;width:70px}
.s3{position:sticky;left:146px;z-index:4;background:var(--panel);min-width:82px;width:82px}
.s4{position:sticky;left:228px;z-index:4;background:var(--panel);min-width:58px;width:58px}
thead .s1,thead .s2,thead .s3,thead .s4{z-index:6;background:var(--panel3)}
tbody tr:hover .s1,tbody tr:hover .s2,tbody tr:hover .s3,tbody tr:hover .s4{background:rgba(59,130,246,.06)}

/* ── Top scroll mirror ── */
.tbl-scroll-top{overflow-x:auto;overflow-y:hidden;border:1px solid var(--border);border-bottom:none;border-radius:var(--r) var(--r) 0 0}
.tbl-scroll-top>div{height:6px}
.tbl-scroll-top+.tblWrap{border-radius:0 0 var(--r) var(--r)}

/* ── Inputs & selects ── */
input,select{
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:6px 10px;
  font:13px 'Inter',sans-serif;
  transition:border-color .15s, box-shadow .15s;
  outline:none;
}
input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
select{cursor:pointer}
input[type=file]{cursor:pointer;padding:5px 8px}
input[type=radio],input[type=checkbox]{cursor:pointer;width:auto;accent-color:var(--accent)}

/* ── Buttons ── */
button.btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;
  border-radius:var(--r-sm);
  padding:7px 15px;cursor:pointer;
  font:12px/1 'Inter',sans-serif;font-weight:600;
  letter-spacing:.2px;
  transition:all .15s;
  box-shadow:0 2px 8px rgba(59,130,246,.3);
}
button.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(59,130,246,.45);
  filter:brightness(1.1);
}
button.btn:active{transform:translateY(0);filter:brightness(.95)}
button.btn.danger{
  background:linear-gradient(135deg,var(--crit),#be123c);
  box-shadow:0 2px 8px rgba(239,68,68,.3);
}
button.btn.danger:hover{box-shadow:0 4px 14px rgba(239,68,68,.45)}
button.btn.sec{
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  box-shadow:none;
}
button.btn.sec:hover{border-color:var(--border2);background:var(--panel3);box-shadow:none}
button.btn.sm{padding:4px 10px;font-size:11px}

/* ── Layout ── */
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.muted{color:var(--muted)}
.hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
label.fld{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted);font-weight:500}

/* ── Dropzone ── */
#dropzone{
  border:2px dashed var(--border);
  border-radius:var(--r-lg);
  padding:32px 20px;
  text-align:center;
  color:var(--muted);
  cursor:pointer;
  transition:all .2s;
  background:rgba(59,130,246,.02);
}
#dropzone:hover,#dropzone.over{
  border-color:var(--accent);
  color:var(--accent-hover);
  background:rgba(59,130,246,.06);
  box-shadow:0 0 0 4px var(--accent-glow);
}

/* ── Charts ── */
canvas{max-height:320px}
.up{color:var(--ok)}.down{color:var(--crit)}

/* ── Pct bar ── */
.pctbar{
  display:inline-block;height:6px;
  border-radius:3px;
  vertical-align:middle;margin-left:8px;
  opacity:.85;
}

/* ── Levantamiento ── */
.lev-radio label{margin-right:8px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:11px}

/* ── Param blocks ── */
.param-block{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;margin-bottom:10px;
  transition:border-color .2s;
}
.param-block:hover{border-color:var(--border2)}
.param-block .param-title{font-weight:600;font-size:12px;color:var(--accent-hover);margin-bottom:5px}
.param-block .param-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.param-block .param-input{display:flex;align-items:center;gap:10px}
.param-block input{width:90px}

/* ── Machine editor ── */
.med-inp{
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:4px;padding:3px 6px;font-size:11px;
  transition:border-color .15s;
}
.med-inp:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px var(--accent-glow)}

/* ── Sector cards ── */
.sector-card{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:14px;cursor:pointer;
  transition:all .2s;
  position:relative;overflow:hidden;
}
.sector-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(59,130,246,.05),transparent);
  opacity:0;transition:opacity .2s;
}
.sector-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.sector-card:hover::after{opacity:1}
.sector-card .sc-num{font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.sector-card .sc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── Máquinas fab cards ── */
.fab-card{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:14px;
  transition:border-color .2s;
}
.fab-card:hover{border-color:var(--border2)}
.fab-card h3{font-size:11px;color:var(--accent-hover);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ── Section dividers ── */
.section-title{
  font-size:10px;font-weight:600;
  color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;
  margin:16px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Chip / filter pills ── */
.chip{
  display:inline-flex;align-items:center;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:3px 11px;
  font-size:11px;font-weight:500;
  cursor:pointer;
  transition:all .15s;
  color:var(--muted);
}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{
  background:rgba(59,130,246,.15);
  border-color:var(--accent);
  color:var(--accent-hover);
}

/* ── Empty state ── */
.empty{
  padding:48px 20px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}
.empty svg,.empty .empty-icon{font-size:32px;opacity:.4;margin-bottom:10px}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <h1>REACBILL <span class="ver">v1.8.9-main</span></h1>
    <span id="dataInfo" class="ver" style="color:var(--muted2);font-size:10px"></span>
  </div>
  <div id="statsBar"></div>
  <div id="paramsBar"></div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>

<script>
/* ===== REACBILL v1.8.9-main ===== */
const VERSION = "1.8.9-main";
const LS_KEY  = "reacbill_v1";
const HIST_KEY = "reacbill_hist_v1";

let state = {
  weeks:{}, weekOrder:[],
  master:{},
  params:{thrOk:0.85,thrMid:0.90,thrCrit:0.40,multMid:3,multCrit:30,sevMid:10,sevHigh:50,sevCrit:150}
};

// historial de intercambios — sólo persiste cuando la app corre como archivo local
let swapHistory = [];

// ---------- Local detection ----------
function isLocal(){
  return location.protocol==="file:"||location.hostname==="localhost"||location.hostname==="127.0.0.1";
}

// ---------- Cifrado simple XOR+base64 (ofuscación, no criptografía fuerte) ----------
const _K = "REACBILL_SWAP_2026";
function xorEnc(str){ return btoa(unescape(encodeURIComponent([...str].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^_K.charCodeAt(i%_K.length))).join("")))); }
function xorDec(enc){ try{ return decodeURIComponent(escape([...atob(enc)].map((c,i)=>String.fromCharCode(c.charCodeAt(0)^_K.charCodeAt(i%_K.length))).join(""))); }catch(e){return"[]";} }

// ---------- Persistencia historial ----------
async function saveHistory(){
  if(!isLocal())return;
  const db=await idb();
  return new Promise((res,rej)=>{
    const tx=db.transaction("kv","readwrite");
    tx.objectStore("kv").put(xorEnc(JSON.stringify(swapHistory)),HIST_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function loadHistory(){
  if(!isLocal())return;
  try{
    const db=await idb();
    return new Promise(res=>{
      const rq=db.transaction("kv").objectStore("kv").get(HIST_KEY);
      rq.onsuccess=()=>{ if(rq.result) swapHistory=JSON.parse(xorDec(rq.result)); res(); };
      rq.onerror=()=>res();
    });
  }catch(e){}
}

const DENOS = ["20000","10000","5000","2000","1000","SIN_DENO"];

// ---------- Persistencia ----------
function idb(){return new Promise((res,rej)=>{
  const r=indexedDB.open("reacbill",2);
  r.onupgradeneeded=e=>{ try{e.target.result.createObjectStore("kv");}catch(x){} };
  r.onsuccess=e=>res(e.target.result); r.onerror=rej;
});}
async function saveState(){
  const db=await idb();
  return new Promise((res,rej)=>{
    const tx=db.transaction("kv","readwrite");
    tx.objectStore("kv").put(JSON.stringify(state),LS_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function loadState(){
  try{
    const db=await idb();
    return new Promise(res=>{
      const rq=db.transaction("kv").objectStore("kv").get(LS_KEY);
      rq.onsuccess=()=>{
        if(rq.result){ const s=JSON.parse(rq.result); state={...state,...s,params:{...state.params,...s.params}}; }
        res();
      };
      rq.onerror=()=>res();
    });
  }catch(e){}
}

// ---------- Helpers isla/sector ----------
function islaPrefix(isla){ return isla?isla.split("-")[0]:""; }
function islaSector(isla){ const p=islaPrefix(isla); return p?p[0]:""; }

// ---------- Cálculos ----------
function weekCalc(week,params){
  const out=[]; let sumT=0,nT=0;
  for(const r of week.rows){
    const toAc=DENOS.reduce((s,d)=>s+(r.acc[d]||0),0);
    const toRe=DENOS.reduce((s,d)=>s+(r.rej[d]||0),0);
    const total=toAc+toRe;
    const pct=(r.pctBill!=null&&r.pctBill>0)?r.pctBill:(total>0?toAc/total:null);
    if(total>0){sumT+=total;nT++;}
    out.push({...r,toAc,toRe,total,pct});
  }
  const avgT=nT?sumT/nT:1;
  for(const m of out){
    if(!m.pct||m.pct>=params.thrOk){ m.score=0; }
    else{
      const mult=m.pct<params.thrCrit?params.multCrit:(m.pct<params.thrMid?params.multMid:1);
      m.score=m.total*(1+Math.log10(m.total))*((params.thrOk-m.pct)/params.thrOk)*(m.total/avgT)*mult;
    }
  }
  const withPct=out.filter(m=>m.pct>0&&m.total>0);
  const modMap={};
  for(const m of withPct){
    const mod=(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)";
    (modMap[mod]=modMap[mod]||[]).push(m.pct);
  }
  const avgByMod={};
  for(const mod in modMap) avgByMod[mod]=avg(modMap[mod]);
  return {
    rows:out, avgT,
    avgPct:   avg(withPct.map(m=>m.pct)),
    avgAdv:   avgByMod["Advance"]||0,
    avgCf:    avgByMod["Cashflow"]||0,
    cntAdv:   (modMap["Advance"]||[]).length,
    cntCf:    (modMap["Cashflow"]||[]).length,
    avgByMod, modMap,
    totBill:  out.reduce((s,m)=>s+m.total,0),
    totAc:    out.reduce((s,m)=>s+m.toAc,0),
    totRe:    out.reduce((s,m)=>s+m.toRe,0)
  };
}
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
function sevClass(sc,p){if(sc<=0)return"ok";if(sc>=p.sevCrit)return"cr";if(sc>=p.sevHigh)return"hi";if(sc>=p.sevMid)return"mid";return"ok";}
const SEVLBL={ok:"OK",mid:"Medio",hi:"Alto",cr:"Urgente"};

// ---------- Formato ----------
const fmtP=v=>v==null||isNaN(v)||v<=0?"—":(v*100).toFixed(2)+"%";
const fmtN=v=>v==null||isNaN(v)?"—":Math.round(v).toLocaleString("es-CL");
const fmt1=v=>v==null||isNaN(v)?"—":v.toFixed(1);
function pctClass(p){

function pctBar(p,w=60){

// ---------- Sort genérico ----------
const sortStates={};
function thColIndex(th){
  const thead=th.closest("thead"); if(!thead)return th.cellIndex;
  const grid=[];
  [...thead.rows].forEach((tr,r)=>{
    grid[r]=grid[r]||[];
    let c=0;
    [...tr.cells].forEach(cell=>{
      while(grid[r][c]!==undefined)c++;
      for(let rr=0;rr<(cell.rowSpan||1);rr++){
        grid[r+rr]=grid[r+rr]||[];
        for(let cc=0;cc<(cell.colSpan||1);cc++)grid[r+rr][c+cc]=cell;
      }
      c+=cell.colSpan||1;
    });
  });
  for(const row of grid){const i=row.indexOf(th);if(i>=0)return i;}
  return th.cellIndex;
}
function sortVal(s){
  if(!s||s==="—")return null;
  if(s.includes("%"))return parseFloat(s.replace(/[+%]/g,""));
  // isla codes like "202-08" → numeric 202008 for correct suffix ordering
  const dashNum=s.match(/^(\d+)-0*(\d+)$/);
  if(dashNum)return parseInt(dashNum[1])*1000+parseInt(dashNum[2]);
  if(/^-?\d{1,3}(\.\d{3})+$/.test(s))return parseFloat(s.replace(/\./g,""));
  const n=parseFloat(s.replace(",","."));
  return isNaN(n)?null:n;
}
function attachSort(tableId){
  const tbl=document.getElementById(tableId); if(!tbl)return;
  tbl.querySelectorAll("th.sortable").forEach(th=>{
    if(th.getAttribute("onclick"))return;
    th.addEventListener("click",()=>{
      const col=thColIndex(th);
      const st=sortStates[tableId]||{col:-1,dir:1};
      const dir=(st.col===col)?-st.dir:1;
      sortStates[tableId]={col,dir};
      tbl.querySelectorAll("th.sortable").forEach(h=>h.classList.remove("s-asc","s-desc"));
      th.classList.add(dir===1?"s-asc":"s-desc");
      const tbody=tbl.tBodies[0]; if(!tbody)return;
      const rows=[...tbody.querySelectorAll("tr:not(.no-sort)")];
      rows.sort((a,b)=>{
        // use only direct text nodes, ignoring nested elements (e.g. muted spans with volume)
        const cellText=cell=>{
          if(!cell)return"";
          const inp=cell.querySelector("input,select");
          if(inp)return inp.value;
          if(cell.hasAttribute("data-sort"))return cell.getAttribute("data-sort");
          const direct=[...cell.childNodes].filter(n=>n.nodeType===3).map(n=>n.textContent.trim()).join("").trim();
          return direct||cell.textContent.trim();
        };
        const av=cellText(a.cells[col]);
        const bv=cellText(b.cells[col]);
        const an=sortVal(av), bn=sortVal(bv);
        if(an!=null&&bn!=null){const d=(an-bn)*dir;if(d!==0)return d;}
        if(an!=null&&bn==null)return -1; if(an==null&&bn!=null)return 1;
        return av.localeCompare(bv,"es",{numeric:true})*dir;
      });
      rows.forEach(r=>tbody.appendChild(r));
    });
  });
}
function reapplySort(tableId){
  const st=sortStates[tableId]; if(!st||st.col<0)return;
  const tbl=document.getElementById(tableId); if(!tbl)return;
  const th=[...tbl.querySelectorAll("th.sortable")].find(h=>thColIndex(h)===st.col);
  if(!th)return;
  sortStates[tableId]={col:st.col,dir:-st.dir}; // flip so click restores correct dir
  th.click();
}

// ---------- Parseo ----------
function fmtLocname(loc){
  const s=String(loc).trim();
  return s.length>2?s.slice(0,s.length-2)+"-"+s.slice(-2):s;
}
function getLoc(mda){ const m=state.master[mda]; if(!m)return""; return m.isla||(m.locname?fmtLocname(m.locname):""); }
function getMod(mda){ return (state.master[mda]?.modelo||"").trim(); }
function getFirm(mda){ return (state.master[mda]?.firm||"").trim(); }
function dateKeyFromName(name){
  let m=name.match(/(\d{4})[-_.](\d{2})[-_.](\d{2})/);
  if(m)return`${m[1]}-${m[2]}-${m[3]}`;
  m=name.match(/(\d{2})[-_.](\d{2})[-_.](\d{4})/);
  if(m)return`${m[3]}-${m[2]}-${m[1]}`;
  return name.replace(/\.[^.]+$/,"").slice(0,10);
}
function fmtKey(k){ const m=k.match(/^(\d{4})-(\d{2})-(\d{2})$/); return m?`${m[3]}-${m[2]}`:k; }
function fmtKeyFull(k){ const m=k.match(/^(\d{4})-(\d{2})-(\d{2})$/); return m?`${m[3]}/${m[2]}/${m[1]}`:k; }
function sortWeeks(){ state.weekOrder=Object.keys(state.weeks).sort((a,b)=>a.localeCompare(b)); }
// últimas N semanas (por defecto los últimos 3 meses) — usado en vistas que listan columnas por semana, para no renderizar todo el histórico y volverse lento
function visibleWeeks(){
  const w=state.weekOrder;
  if(w.length<=1)return w;
  const lastD=w[w.length-1];
  const m=lastD.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m)return w;
  const cutoff=new Date(+m[1],+m[2]-1,+m[3]);
  cutoff.setMonth(cutoff.getMonth()-3);
  const cutoffKey=`${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,"0")}-${String(cutoff.getDate()).padStart(2,"0")}`;
  return w.filter(d=>d>=cutoffKey);
}

function parseCnText(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return 0;
  const sep=lines[0].includes(";")?";":"\t";
  const hdr=lines[0].split(sep).map(h=>h.trim().toUpperCase());
  const iS=hdr.indexOf("SMDBID"),iL=hdr.indexOf("LOCNAME");
  if(iS<0||iL<0)return 0;
  let n=0;
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(sep);
    if(c.length<=Math.max(iS,iL))continue;
    const mda=c[iS].trim(),loc=c[iL].trim();
    if(!mda||!loc||loc==="err")continue;
    state.master[mda]={...(state.master[mda]||{}),locname:loc,isla:fmtLocname(loc)};
    n++;
  }
  return n;
}
function parseDataSheet(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  if(!arr.length)return null;
  const hdr=arr[0].map(h=>String(h??"").trim());
  const idx={maq:-1,tA:-1,tR:-1,ses:-1,pT:-1,pB:-1,acc:{},rej:{}};
  hdr.forEach((h,i)=>{
    const hl=h.toLowerCase();
    if(hl==="maquina"||hl==="máquina"||hl==="mda"||hl==="smdbid") idx.maq=i;
    else if(/^tarjeta acepta/i.test(h)) idx.tA=i;
    else if(/^tarjeta rechaza/i.test(h)) idx.tR=i;
    else if(/sesion/i.test(h)) idx.ses=i;
    else if(/aceptaci[oó]n tarjeta/i.test(h)) idx.pT=i;
    else if(/aceptaci[oó]n billetes?/i.test(h)) idx.pB=i;
    else if(/billete aceptado/i.test(h)){const d=h.replace(/billete aceptado/i,"").trim()||"SIN_DENO";idx.acc[d]=i;}
    else if(/billete rechazado/i.test(h)){const d=h.replace(/billete rechazado/i,"").trim()||"SIN_DENO";idx.rej[d]=i;}
  });
  if(idx.maq<0)return null;
  // debe tener al menos una columna de datos de aceptación para ser una planilla semanal
  if(idx.tA<0&&idx.tR<0&&Object.keys(idx.acc).length===0&&idx.pB<0)return null;
  const rows=[];
  for(let r=1;r<arr.length;r++){
    const row=arr[r]; if(!row)continue;
    const mda=String(row[idx.maq]??"").trim();
    if(!mda||mda==="0"||mda==="err"||!/^\d+$/.test(mda))continue;
    const num=i=>i>=0&&row[i]!=null?Number(row[i])||0:0;
    const pNum=i=>i>=0&&row[i]!=null&&row[i]!==""?Number(row[i]):NaN;
    const acc={},rej={};
    for(const d in idx.acc)acc[d]=num(idx.acc[d]);
    for(const d in idx.rej)rej[d]=num(idx.rej[d]);
    const pB=pNum(idx.pB);
    rows.push({mda,tarjAc:num(idx.tA),tarjRe:num(idx.tR),sesiones:num(idx.ses),
      acc,rej,pctTarj:pNum(idx.pT),pctBill:isNaN(pB)?null:pB});
    if(!state.master[mda])state.master[mda]={isla:"",fabricante:"",modelmaq:"",juego:"",modelo:"",modeloFuente:"",firm:"",area:"",serial:"",category:"",deno:""};
  }
  return rows.length?{rows}:null;
}
function parseContadores(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  const hdr=(arr[0]||[]).map(h=>String(h??"").trim().toUpperCase());
  const iId=hdr.indexOf("SMDBID"),iLoc=hdr.indexOf("LOCNAME"),
        iMan=hdr.findIndex(h=>h.startsWith("MANUF")),iJue=hdr.indexOf("JUEGO");
  if(iId<0)return 0;
  let n=0;
  for(let r=1;r<arr.length;r++){
    const row=arr[r]; if(!row||row[iId]==null)continue;
    const mda=String(row[iId]).trim(); if(!mda)continue;
    const loc=iLoc>=0?String(row[iLoc]??"").trim():"";
    state.master[mda]={...(state.master[mda]||{}),
      locname:loc, isla:loc?fmtLocname(loc):"",
      fabricante:iMan>=0?String(row[iMan]??"").trim():"",
      juego:iJue>=0?String(row[iJue]??"").trim():""};
    n++;
  }
  return n;
}
function parseSeguimientoModelos(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  let n=0;
  for(let r=4;r<arr.length;r++){
    const row=arr[r]; if(!row)continue;
    const mda=String(row[0]??"").trim(); if(!mda||!/^\d+$/.test(mda))continue;
    const fab=String(row[1]??"").trim(), mod=String(row[2]??"").trim();
    const firm=String(row[3]??"").trim(), isla=String(row[4]??"").trim();
    state.master[mda]={...(state.master[mda]||{}),
      fabricante:fab||state.master[mda]?.fabricante||"",
      modelo:mod||state.master[mda]?.modelo||"",
      modeloFuente:mod?"import":(state.master[mda]?.modeloFuente||""),
      firm:firm||state.master[mda]?.firm||"",
      isla:isla||state.master[mda]?.isla||""};
    if(mod)n++;
  }
  return n;
}

function parseMasterReference(wb){
  // Detecta hoja con "Machine ID" y "Manufacturer" — planilla maestra de referencia
  const norm=s=>String(s??"").trim().toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  for(const sn of wb.SheetNames){
    const arr=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null});
    // buscar fila de encabezado en las primeras 5 filas
    let hdr=null, hi=0;
    for(let i=0;i<Math.min(5,arr.length);i++){
      const row=(arr[i]||[]).map(norm);
      if(row.some(c=>c.includes("MACHINE ID")||c==="MACHINE ID")&&row.some(c=>c.includes("MANUFACTURER"))){hdr=row;hi=i;break;}
    }
    if(!hdr)continue;
    const col=k=>hdr.findIndex(c=>c.includes(k));
    const iMda=col("MACHINE ID"), iPos=col("POSITION"), iArea=col("AREA");
    const iJue=col("TITLE GAME"), iFab=col("MANUFACTURER");
    const iMmq=col("CABINET MODEL"), iSerial=col("SERIAL"), iCat=col("CATEGORY"), iDeno=col("DENO");
    if(iMda<0||iFab<0)continue;
    const get=(row,i)=>i>=0&&row[i]!=null?String(row[i]).trim():"";
    let n=0;
    for(let r=hi+1;r<arr.length;r++){
      const row=arr[r]; if(!row)continue;
      const mda=get(row,iMda); if(!mda||!/^\d+$/.test(mda))continue;
      const locraw=get(row,iPos);
      const isla=locraw?fmtLocname(locraw):"";
      if(!state.master[mda])state.master[mda]={isla:"",fabricante:"",modelmaq:"",juego:"",modelo:"",modeloFuente:"",firm:"",area:"",serial:"",category:"",deno:""};
      const ms=state.master[mda];
      if(isla)   { ms.isla=isla; ms.locname=locraw; }
      if(iArea>=0) ms.area=get(row,iArea)||ms.area;
      if(iJue>=0)  ms.juego=get(row,iJue)||ms.juego;
      if(iFab>=0)  ms.fabricante=get(row,iFab)||ms.fabricante;
      if(iMmq>=0)  ms.modelmaq=get(row,iMmq)||ms.modelmaq;
      if(iSerial>=0) ms.serial=get(row,iSerial)||ms.serial;
      if(iCat>=0)  ms.category=get(row,iCat)||ms.category;
      if(iDeno>=0) ms.deno=get(row,iDeno)||ms.deno;
      n++;
    }
    if(n>0)return n;
  }
  return 0;
}
function parseTipoBilletero(wb){
  // Busca hoja con columnas ISLA, MÁQUINA/MAQUINA, TIPO BILLETERO
  const norm=s=>String(s??"").trim().toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  for(const sn of wb.SheetNames){
    const arr=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null});
    if(!arr.length)continue;
    // buscar fila de encabezado (primeras 5 filas)
    let hdr=null, hi=0;
    for(let i=0;i<Math.min(5,arr.length);i++){
      const row=(arr[i]||[]).map(norm);
      if(row.some(c=>c.includes("MAQUINA"))&&row.some(c=>c.includes("BILLETERO"))){hdr=row;hi=i;break;}
    }
    if(!hdr)continue;
    const iMaq=hdr.findIndex(c=>c.includes("MAQUINA"));
    const iTipo=hdr.findIndex(c=>c.includes("BILLETERO"));
    if(iMaq<0||iTipo<0)continue;
    let n=0;
    for(let r=hi+1;r<arr.length;r++){
      const row=arr[r]; if(!row)continue;
      const mda=String(row[iMaq]??"").trim(); if(!mda||!/^\d+$/.test(mda))continue;
      const raw=norm(String(row[iTipo]??""));
      const modelo=raw.includes("CASHFLOW")?"Cashflow":raw.includes("ADVANCE")?"Advance":"";
      if(!modelo)continue;
      if(!state.master[mda])state.master[mda]={isla:"",fabricante:"",modelmaq:"",juego:"",modelo:"",modeloFuente:"",firm:"",area:"",serial:"",category:"",deno:""};
      state.master[mda].modelo=modelo;
      state.master[mda].modeloFuente="import";
      n++;
    }
    if(n>0)return n;
  }
  return 0;
}

async function handleFiles(files){
  const log=[];
  for(const f of files){
    try{
      const ext=(f.name.match(/\.([^.]+)$/)||["",""])[1].toLowerCase();
      // ---- ZIP: extraer archivos y procesarlos recursivamente ----
      if(ext==="zip"){
        const zip=await JSZip.loadAsync(await f.arrayBuffer());
        const innerFiles=[];
        for(const [path,entry] of Object.entries(zip.files)){
          if(entry.dir)continue;
          const name=path.split("/").pop();
          const innerExt=(name.match(/\.([^.]+)$/)||["",""])[1].toLowerCase();
          if(!["xlsx","xls","xlsm","xlsb"].includes(innerExt))continue;
          const blob=await entry.async("blob");
          innerFiles.push(new File([blob],name,{type:blob.type}));
        }
        if(!innerFiles.length){ log.push(`${f.name}: ZIP sin archivos Excel dentro`); continue; }
        log.push(`${f.name}: ${innerFiles.length} Excel encontrados en el ZIP`);
        // procesar igual que si se hubieran subido directo
        for(const inner of innerFiles){
          try{
            const wb=XLSX.read(await inner.arrayBuffer(),{type:"array"});
            const masterSheets=wb.SheetNames.filter(n=>/^\d{2}-\d{2}$/.test(n));
            if(masterSheets.length){
              let imp=0;
              for(const sn of masterSheets){
                const wk=parseDataSheet(wb.Sheets[sn]);
                if(wk){
                  const [dd,mm]=sn.split("-").map(Number);
                  const now=new Date(); let yr=now.getFullYear();
                  if(mm>now.getMonth()+1)yr--;
                  const key=`${yr}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
                  state.weeks[key]=wk; imp++;
                }
              }
              if(wb.Sheets["Contadores"])parseContadores(wb.Sheets["Contadores"]);
              if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
              log.push(`  └ ${inner.name}: ${imp} semanas importadas`);
            } else {
              let sn=wb.SheetNames.find(n=>/ultima/i.test(n))
                    ||wb.SheetNames.find(n=>/semana/i.test(n));
              // fallback: omite la hoja 0 (reporte mensual con misma estructura)
              if(!sn){ for(const c of wb.SheetNames.slice(1)){ if(parseDataSheet(wb.Sheets[c])){sn=c;break;} } }
              const wk=sn?parseDataSheet(wb.Sheets[sn]):null;
              if(wk){ const key=dateKeyFromName(inner.name); state.weeks[key]=wk; log.push(`  └ ${inner.name} → ${fmtKeyFull(key)}`); }
              else{
                const nRef=parseMasterReference(wb);
                if(nRef>0)log.push(`  └ ${inner.name}: ${nRef} máquinas actualizadas (referencia maestra)`);
                else{
                  const nT=parseTipoBilletero(wb);
                  if(nT>0)log.push(`  └ ${inner.name}: ${nT} modelos de billetero actualizados`);
                  else log.push(`  └ ${inner.name}: formato no reconocido`);
                }
              }
              if(wb.Sheets["Contadores"])parseContadores(wb.Sheets["Contadores"]);
              if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
            }
          }catch(e){ log.push(`  └ ${inner.name}: ERROR — ${e.message}`); }
        }
        continue;
      }
      const isExcel=["xlsx","xls","xlsm","xlsb"].includes(ext);
      if(!isExcel){
        let text; try{ text=await f.text(); }catch(e){ text=""; }
        if(ext==="json"){
          try{
            const data=JSON.parse(text);
            if(Array.isArray(data)||(data&&Array.isArray(data.master))){
              const n=importMasterJSON(data);
              log.push(`${f.name}: ${n} máquinas importadas (maestro JSON)`);
              await saveState(); renderAll(); document.getElementById("uplog").innerHTML=log.map(l=>"• "+l).join("<br>");
            } else { log.push(`${f.name}: JSON no reconocido`); }
          }catch(e){ log.push(`${f.name}: JSON inválido — ${e.message}`); }
          continue;
        }
        if((text.includes("SMDBID")||text.includes("LOCNAME"))&&text.includes(";")){
          const n=parseCnText(text);
          if(n>0){ log.push(`${f.name}: ${n} ubicaciones cargadas (cn)`); await saveState(); renderAll(); document.getElementById("uplog").innerHTML=log.map(l=>"• "+l).join("<br>"); continue; }
        }
        if(ext&&!["csv","txt","tsv"].includes(ext)){ log.push(`${f.name}: formato no reconocido`); continue; }
      }
      const wb=XLSX.read(await f.arrayBuffer(),{type:"array"});
      const masterSheets=wb.SheetNames.filter(n=>/^\d{2}-\d{2}$/.test(n));
      if(masterSheets.length){
        let imp=0;
        for(const sn of masterSheets){
          const wk=parseDataSheet(wb.Sheets[sn]);
          if(wk){
            const [dd,mm]=sn.split("-").map(Number);
            const now=new Date(); let yr=now.getFullYear();
            if(mm>now.getMonth()+1)yr--;
            const key=`${yr}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
            state.weeks[key]=wk; imp++;
          }
        }
        if(wb.Sheets["Contadores"])log.push("Contadores: "+parseContadores(wb.Sheets["Contadores"])+" máquinas");
        if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
        log.push(`${f.name}: ${imp} semanas históricas importadas`);
      } else {
        let sn=wb.SheetNames.find(n=>/ultima/i.test(n))
              ||wb.SheetNames.find(n=>/semana/i.test(n));
        // fallback: omite la hoja 0 (reporte mensual con misma estructura)
        if(!sn){ for(const c of wb.SheetNames.slice(1)){ if(parseDataSheet(wb.Sheets[c])){sn=c;break;} } }
        const wk=sn?parseDataSheet(wb.Sheets[sn]):null;
        if(wk){ const key=dateKeyFromName(f.name); state.weeks[key]=wk; log.push(`${f.name} → ${fmtKeyFull(key)} (${wk.rows.length} máq., hoja: ${sn})`); }
        else{
          const nRef=parseMasterReference(wb);
          if(nRef>0){log.push(`${f.name}: ${nRef} máquinas actualizadas (referencia maestra)`); }
          else{
            const nTipo=parseTipoBilletero(wb);
            if(nTipo>0)log.push(`${f.name}: ${nTipo} modelos de billetero actualizados`);
            else log.push(`${f.name}: formato de datos no reconocido`);
          }
        }
        if(wb.Sheets["Contadores"])log.push("Contadores: "+parseContadores(wb.Sheets["Contadores"])+" máquinas");
        if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
      }
    }catch(e){ log.push(`${f.name}: ERROR — ${e.message}`); }
  }
  sortWeeks(); invalidate(); await saveState(); renderAll();
  const ul=document.getElementById("uplog");
  if(ul)ul.innerHTML=log.map(l=>"• "+l).join("<br>");
}

// ---------- top scrollbar sync ----------
function syncTopScroll(topId, wrapId, tblId){
  const top=document.getElementById(topId), wrap=document.getElementById(wrapId), tbl=document.getElementById(tblId);
  if(!top||!wrap||!tbl)return;
  top.firstElementChild.style.width=tbl.offsetWidth+"px";
  let skip=false;
  top.onscroll=()=>{ if(skip){skip=false;return;} skip=true; wrap.scrollLeft=top.scrollLeft; };
  wrap.onscroll=()=>{ if(skip){skip=false;return;} skip=true; top.scrollLeft=wrap.scrollLeft; };
}

let resSortState=null;
let resFiltroVal="";
function resSort(wk,field){
  if(resSortState&&resSortState.wk===wk&&resSortState.field===field) resSortState.dir*=-1;
  else resSortState={wk,field,dir:field==="pct"?1:-1};
  renderResBody();
}
function renderResumen(){
  const el=document.getElementById("tab-resumen");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const hidden=state.weekOrder.length-visibleWeeks().length;
  el.innerHTML=`<div class="card"><h2>Resumen histórico</h2>
    <div class="row">
      <input id="resFiltro" placeholder="Filtrar MDA / ISLA / Modelo" value="${resFiltroVal.replace(/"/g,'&quot;')}"
        oninput="resFiltroVal=this.value;resApplyFilter();" style="width:280px;cursor:text">
      <span class="hint">Click en % o Total para ordenar por semana</span>
      ${hidden>0?`<span class="hint">· mostrando últimos 3 meses (${hidden} semana${hidden===1?"":"s"} más antigua${hidden===1?"":"s"} oculta${hidden===1?"":"s"})</span>`:""}
    </div>
    <div id="resTopScroll" class="tbl-scroll-top"><div></div></div>
    <div class="tblWrap" id="resTblWrap" style="max-height:75vh"></div></div>`;
  renderResBody();
}
function renderResBody(){
  const wrap=document.getElementById("resTblWrap"); if(!wrap)return;
  const calcs=allCalcs(), weeks=visibleWeeks();
  const mdaMap=new Map();
  for(const d of weeks) for(const m of calcs[d].rows){
    if(!mdaMap.has(m.mda))mdaMap.set(m.mda,{});
    mdaMap.get(m.mda)[d]=m;
  }
  const ss=resSortState;
  let head=`<tr>
    <th class="s1 left sortable">MDA</th>
    <th class="s2 left sortable">ISLA</th>
    <th class="s3 left sortable">Modelo</th>
    <th class="s4 left sortable">Firm</th>`;
  let head2=`<tr>
    <th class="s1"></th><th class="s2"></th><th class="s3"></th><th class="s4"></th>`;
  for(const d of weeks){
    const ps=ss&&ss.wk===d&&ss.field==="pct", ts=ss&&ss.wk===d&&ss.field==="tot";
    head+=`<th colspan="2" style="text-align:center">${fmtKey(d)}</th>`;
    head2+=`<th class="sortable ${ps?(ss.dir===1?"s-asc":"s-desc"):""}" onclick="resSort('${d}','pct')">%</th>`;
    head2+=`<th class="sortable ${ts?(ss.dir===1?"s-asc":"s-desc"):""}" onclick="resSort('${d}','tot')">Total</th>`;
  }
  head+="</tr>"; head2+="</tr>";
  let mdaList=[...mdaMap.keys()];
  if(ss){
    mdaList.sort((a,b)=>{
      const ma=mdaMap.get(a)[ss.wk], mb=mdaMap.get(b)[ss.wk];
      const va=ma&&ma.pct>0?(ss.field==="pct"?ma.pct:ma.total):(ss.dir===1?-1:Infinity);
      const vb=mb&&mb.pct>0?(ss.field==="pct"?mb.pct:mb.total):(ss.dir===1?-1:Infinity);
      return(va-vb)*ss.dir;
    });
  } else mdaList.sort();
  let body="";
  for(const mda of mdaList){
    const loc=getLoc(mda), mod=getMod(mda), firm=getFirm(mda);
    const searchKey=(mda+loc+mod+firm).toLowerCase().replace(/"/g,"&quot;");
    let tr=`<td class="s1 left"><b>${mda}</b></td><td class="s2 left muted">${loc}</td><td class="s3 left muted">${mod}</td><td class="s4 left muted" style="font-size:10px">${firm}</td>`;
    for(const d of weeks){
      const m=mdaMap.get(mda)?.[d];
      tr+=(m&&m.pct>0)?`<td class="${pctClass(m.pct)}">${fmtP(m.pct)}</td><td>${fmtN(m.total)}</td>`:`<td></td><td></td>`;
    }
    body+=`<tr data-search="${searchKey}">${tr}</tr>`;
  }
  wrap.innerHTML=`<table id="tblResumen"><thead>${head}${head2}</thead><tbody>${body}</tbody></table>`;
  attachSort("tblResumen");
  resApplyFilter();
  requestAnimationFrame(()=>syncTopScroll("resTopScroll","resTblWrap","tblResumen"));
}
function resApplyFilter(){
  const tbl=document.getElementById("tblResumen"); if(!tbl)return;
  const rows=tbl.tBodies[0]?.rows; if(!rows)return;
  const q=resFiltroVal.toLowerCase().trim();
  for(const tr of rows){
    tr.style.display=(!q||(tr.getAttribute("data-search")||"").includes(q))?"":"none";
  }
}

// ---------- Sectores ----------
function renderSectores(){
  const el=document.getElementById("tab-sectores");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const selSector=document.getElementById("secSel")?.value||"";
  const selIsla=document.getElementById("secIslaSel")?.value||"";
  const calcs=allCalcs();
  const lastD=state.weekOrder[state.weekOrder.length-1];
  const lastC=calcs[lastD];
  // agrupar por sector → isla_prefix → máquinas
  const sectorMap={};
  for(const [mda,ms] of Object.entries(state.master)){
    const isla=ms.isla||"";
    if(!isla)continue;
    const prefix=islaPrefix(isla);
    const sector=islaSector(isla);
    if(!sectorMap[sector])sectorMap[sector]={};
    if(!sectorMap[sector][prefix])sectorMap[sector][prefix]=[];
    sectorMap[sector][prefix].push(mda);
  }
  const sectors=Object.keys(sectorMap).sort();
  // Resumen de sectores
  function islaStats(mdas,c){
    const rows=c.rows.filter(m=>mdas.includes(m.mda)&&m.total>0);
    const totAc=rows.reduce((s,m)=>s+m.toAc,0);
    const totAll=rows.reduce((s,m)=>s+m.total,0);
    return { pct:totAll>0?totAc/totAll:0, tot:totAll, alerts:rows.filter(m=>m.score>0).length, n:rows.length };
  }
  // cards de sectores
  let sectorCards=`<div class="grid3" style="margin-bottom:12px">`;
  for(const sec of sectors){
    const allMdas=Object.values(sectorMap[sec]).flat();
    const st=islaStats(allMdas,lastC);
    const cls=pctClass(st.pct);
    const active=sec===selSector?"border:2px solid var(--accent)":"";
    sectorCards+=`<div class="sector-card" onclick="secSelSector('${sec}')" style="${active}">
      <div class="sc-num" style="${cls?`color:${cls==='c-ok'?'var(--ok)':cls==='c-mid'?'var(--mid)':cls==='c-hi'?'var(--high)':'var(--crit)'}`:''}">${sec}</div>
      <div style="font-size:14px;font-weight:600;margin:2px 0">${fmtP(st.pct)}</div>
      <div class="sc-lbl">${Object.keys(sectorMap[sec]).length} islas · ${allMdas.length} máq · ${st.alerts} alertas</div>
    </div>`;
  }
  sectorCards+="</div>";
  // detalle de sector seleccionado
  let sectorDetail="";
  if(selSector&&sectorMap[selSector]){
    const islas=Object.keys(sectorMap[selSector]).sort();
    // tabla de islas del sector
    let islaRows="";
    for(const prefix of islas){
      const mdas=sectorMap[selSector][prefix];
      const st=islaStats(mdas,lastC);
      const prev=state.weekOrder.length>=2?islaStats(mdas,calcs[state.weekOrder[state.weekOrder.length-2]]):null;
      const trend=prev&&prev.pct>0?st.pct-prev.pct:null;
      const active=prefix===selIsla?"background:var(--accent);color:#fff;font-weight:700":"";
      islaRows+=`<tr style="cursor:pointer;${active}" onclick="secSelIsla('${prefix}')">
        <td class="left"><b>${prefix}</b></td>
        <td>${mdas.length}</td>
        <td class="${pctClass(st.pct)}">${fmtP(st.pct)}</td>
        <td>${pctBar(st.pct,50)}</td>
        <td>${fmtN(st.tot)}</td>
        <td class="${trend==null?'':trend>=0?'up':'down'}">${trend==null?"—":(trend>=0?"+":"")+(trend*100).toFixed(1)+"%"}</td>
        <td style="color:${st.alerts>0?'var(--high)':'var(--muted)'}">${st.alerts}</td>
      </tr>`;
      // fila expandida con el detalle de máquinas, justo debajo de la isla clickeada
      if(prefix===selIsla){
        const sMdas=mdas.slice().sort((a,b)=>a.localeCompare(b,"es",{numeric:true}));
        let machRows="";
        for(const mda of sMdas){
          const ms=state.master[mda]||{};
          let hist="";
          for(const d of visibleWeeks()){
            const m=calcs[d]?.rows.find(r=>r.mda===mda);
            hist+=(m&&m.pct>0)?`<td class="${pctClass(m.pct)}">${fmtP(m.pct)}<br><span class="muted">${fmtN(m.total)}</span></td>`:`<td class="muted">—</td>`;
          }
          machRows+=`<tr><td class="left"><b>${mda}</b></td><td class="left">${getLoc(mda)}</td>

            <td class="left">${ms.juego||"—"}</td>${hist}</tr>`;
        }

        islaRows+=`<tr class="no-sort"><td colspan="7" style="padding:10px;background:var(--bg2,#0d1626)">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px">Isla ${selIsla} — ${mdas.length} máquinas · ${fmtP(islaS.pct)} prom. · ${islaS.alerts} alertas</div>
          <div class="tblWrap" style="overflow-y:visible"><table id="tblSecMach">
            <thead><tr>
              <th class="left sortable" title="Número de máquina (MDA)">MDA</th>
              <th class="left sortable" title="Isla donde está ubicada la máquina">ISLA</th>
              <th class="left sortable" title="Modelo del billetero (Advance / Cashflow)">Modelo</th>
              <th class="left sortable" title="Versión de firmware del billetero">Firm</th>
              <th class="left sortable" title="Juego/título de la máquina">Juego</th>
              ${visibleWeeks().map(d=>`<th class="sortable" title="% de aceptación semana ${fmtKey(d)}">${fmtKey(d)}</th>`).join("")}
            </tr></thead>
            <tbody>${machRows}</tbody></table></div></td></tr>`;
      }
    }
    sectorDetail=`<div class="card"><h2>Sector ${selSector} — islas</h2>
      <div class="tblWrap" style="overflow-y:visible"><table id="tblSecIslas">
        <thead><tr>
          <th class="left sortable" title="Código de isla (3 dígitos)">ISLA</th>
          <th class="sortable" title="Número de máquinas en la isla">Máq.</th>
          <th class="sortable" title="Promedio de % de aceptación de billetes en la última semana">% prom.</th>
          <th title="Barra visual del % de aceptación (verde=bueno, rojo=malo)">Barra</th>
          <th class="sortable" title="Total de billetes procesados en la última semana">Total bill.</th>
          <th class="sortable" title="Variación del % de aceptación respecto a la semana anterior (positivo = mejoró)">Δ%</th>
          <th class="sortable" title="Número de máquinas con alertas (% bajo el umbral crítico)">Alertas</th>
        </tr></thead><tbody>${islaRows}</tbody></table></div></div>`;
  }
  el.innerHTML=`<div class="card"><h2>Vista por sectores</h2>
    <div class="hint" style="margin-bottom:10px">Sector = primer dígito de la ISLA (ej: sector 6 = islas 6xx). Semana analizada: <b>${fmtKeyFull(lastD)}</b></div>
    ${sectorCards}
    <input type="hidden" id="secSel" value="${selSector}">
    <input type="hidden" id="secIslaSel" value="${selIsla}">
  </div>${sectorDetail}`;
  attachSort("tblSecIslas"); reapplySort("tblSecIslas");
  attachSort("tblSecMach");  reapplySort("tblSecMach");
}

// ---------- Modelos ----------
function renderModelos(){
  const el=document.getElementById("tab-modelos");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const calcs=allCalcs();
  const sel=document.getElementById("modSel")?.value;
  const d=state.weekOrder.includes(sel)?sel:state.weekOrder[state.weekOrder.length-1];
  const c=calcs[d];
  const groups={};
  for(const m of c.rows){
    const mod=(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)";
    const g=groups[mod]=groups[mod]||{n:0,tot:0,ac:0,re:0,alert:0};
    g.n++; g.tot+=m.total; g.ac+=m.toAc; g.re+=m.toRe;
    if(m.score>0)g.alert++;
  }
  const rows=Object.entries(groups).sort((a,b)=>b[1].tot-a[1].tot);
  let body=rows.map(([mod,g])=>`<tr>
    <td class="left"><b>${mod}</b></td><td>${g.n}</td><td>${fmtN(g.tot)}</td><td>${fmtN(g.re)}</td>
    <td class="${pctClass(g.tot>0?g.ac/g.tot:0)}">${g.tot>0?fmtP(g.ac/g.tot):"—"}</td>
    <td>${g.alert}</td></tr>`).join("");
  const allMods=[...new Set(state.weekOrder.flatMap(d2=>
    calcs[d2].rows.map(m=>(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)")))].sort();
  const colors=["#2ecc71","#f1c40f","#4f8ff7","#e74c3c","#9b59b6","#1abc9c"];
  const lbl=state.weekOrder.map(fmtKey);
  const datasets=allMods.map((mod,i)=>({
    label:mod,
    data:state.weekOrder.map(d2=>{
      const r2=calcs[d2].rows.filter(m=>(state.master[m.mda]?.modelo||"(sin dato)").trim()===mod&&m.total>0);
      const ac2=r2.reduce((s,m)=>s+m.toAc,0),tot2=r2.reduce((s,m)=>s+m.total,0);
      return tot2>0?+(ac2/tot2*100).toFixed(2):null;
    }),
    borderColor:colors[i%colors.length],tension:.3,spanGaps:true
  }));
  el.innerHTML=`<div class="card"><h2>Comparativa por modelo de billetero</h2>
    <div class="row"><label class="fld">Semana <select id="modSel" onchange="renderModelos()">${state.weekOrder.map(w=>`<option value="${w}" ${w===d?"selected":""}>${fmtKeyFull(w)}</option>`).join("")}</select></label></div>
    <div class="tblWrap" style="max-height:40vh"><table id="tblMod">
      <thead><tr><th class="left sortable">Modelo</th><th class="sortable">Máq.</th><th class="sortable">Total</th><th class="sortable">Rechazos</th><th class="sortable">% acep.</th><th class="sortable">Alertas</th></tr></thead>
      <tbody>${body}</tbody></table></div></div>
    <div class="card" style="margin-top:12px"><h2>Tendencia % por modelo</h2><canvas id="cvModTrend" style="max-height:280px"></canvas></div>`;
  attachSort("tblMod");
  Chart.defaults.color="#8fa0c0"; Chart.defaults.borderColor="#2e3b58";
  new Chart(document.getElementById("cvModTrend"),{type:"line",data:{labels:lbl,datasets},options:{scales:{y:{ticks:{callback:v=>v+"%"}}}}});
}

// ---------- Máquinas (por fabricante → modelo → isla → máquinas) ----------
let maqSelFab="", maqSelJuego="", maqSelGameTitle="";
function renderMaquinas(){
  const el=document.getElementById("tab-maquinas");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const calcs=allCalcs();
  const selD=document.getElementById("maqSel")?.value;
  const d=state.weekOrder.includes(selD)?selD:state.weekOrder[state.weekOrder.length-1];
  const c=calcs[d];
  // mapa rápido pct/total por mda
  const pm={};
  for(const m of c.rows) pm[m.mda]={pct:m.pct,total:m.total,toAc:m.toAc,score:m.score};
  // agrupar: fabricante → modelmaq → juego → prefijo isla → [mda]
  const fabMap={};
  for(const [mda,ms] of Object.entries(state.master)){
    if(!pm[mda]||!pm[mda].total)continue;
    const fab=ms.fabricante||"(sin dato)";
    const mmq=ms.modelmaq||"(sin modelo)";
    const jue=ms.juego||"(sin dato)";
    const pre=islaPrefix(ms.isla||"")||ms.isla||"—";
    if(!fabMap[fab])fabMap[fab]={};
    if(!fabMap[fab][mmq])fabMap[fab][mmq]={};
    if(!fabMap[fab][mmq][jue])fabMap[fab][mmq][jue]={};
    if(!fabMap[fab][mmq][jue][pre])fabMap[fab][mmq][jue][pre]=[];
    fabMap[fab][mmq][jue][pre].push(mda);
  }
  // maqSelJuego ahora es "modelmaq" (nivel 2); maqSelMmq sería nivel 3 (juego)
  if(maqSelFab&&!fabMap[maqSelFab]){maqSelFab="";maqSelJuego="";}
  if(maqSelJuego&&!fabMap[maqSelFab]?.[maqSelJuego])maqSelJuego="";
  if(maqSelGameTitle&&!fabMap[maqSelFab]?.[maqSelJuego]?.[maqSelGameTitle])maqSelGameTitle="";
  const escape=s=>s.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  let html="";
  for(const fab of Object.keys(fabMap).sort()){
    const isOpen=fab===maqSelFab;
    const allM=Object.values(fabMap[fab]).flatMap(mmq=>Object.values(mmq).flatMap(j=>Object.values(j).flat()));
    const fabAc=allM.reduce((s,m)=>s+(pm[m]?.toAc||0),0);
    const fabTot=allM.reduce((s,m)=>s+(pm[m]?.total||0),0);
    const fabAlerts=allM.filter(m=>(pm[m]?.score||0)>0).length;
    const fabPct=fabTot>0?fabAc/fabTot:0;
    html+=`<div class="fab-card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:4px 0" onclick="maqToggleFab('${escape(fab)}')">
        <span style="font-size:13px;color:var(--accent)">${isOpen?"▼":"▶"}</span>
        <span style="font-weight:700;font-size:15px;flex:1">${fab}</span>
        <span class="${pctClass(fabPct)}" style="font-weight:700">${fmtP(fabPct)}</span>
        <span class="muted" style="font-size:11px">${allM.length} máq.</span>
        ${fabAlerts?`<span style="color:var(--high);font-size:11px">⚠ ${fabAlerts}</span>`:""}
      </div>`;
    if(isOpen){
      // nivel 2: modelo de máquina
      const mmqs=Object.keys(fabMap[fab]).sort();
      html+=`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;padding-left:18px">`;
      for(const mmq of mmqs){
        const mMdas=Object.values(fabMap[fab][mmq]).flatMap(j=>Object.values(j).flat());
        const mAc=mMdas.reduce((s,m)=>s+(pm[m]?.toAc||0),0);
        const mTot=mMdas.reduce((s,m)=>s+(pm[m]?.total||0),0);
        const mP=mTot>0?mAc/mTot:0;
        const sel=mmq===maqSelJuego;
        html+=`<button class="btn sm ${sel?'':'sec'}" onclick="maqToggleJuego('${escape(mmq)}','${escape(fab)}')">
          ${mmq}&nbsp;<span class="${pctClass(mP)}">${fmtP(mP)}</span>
          <span class="muted" style="font-size:10px">&nbsp;${mMdas.length}</span>
        </button>`;
      }
      html+=`</div>`;
      // nivel 3: juego (dentro del modelo seleccionado)
      if(maqSelJuego&&fabMap[fab][maqSelJuego]){
        const juegos=Object.keys(fabMap[fab][maqSelJuego]).sort();
        html+=`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;padding-left:36px">`;
        for(const jue of juegos){
          const jMdas=Object.values(fabMap[fab][maqSelJuego][jue]).flat();
          const jAc=jMdas.reduce((s,m)=>s+(pm[m]?.toAc||0),0);
          const jTot=jMdas.reduce((s,m)=>s+(pm[m]?.total||0),0);
          const jP=jTot>0?jAc/jTot:0;
          const sel=jue===maqSelGameTitle;
          html+=`<button class="btn sm ${sel?'':'sec'}" style="font-size:11px" onclick="maqToggleGame('${escape(jue)}','${escape(maqSelJuego)}','${escape(fab)}')">
            ${jue}&nbsp;<span class="${pctClass(jP)}">${fmtP(jP)}</span>
            <span class="muted" style="font-size:10px">&nbsp;${jMdas.length}</span>
          </button>`;
        }
        html+=`</div>`;
        // nivel 4: islas y máquinas
        if(maqSelGameTitle&&fabMap[fab][maqSelJuego][maqSelGameTitle]){
          const islaMap=fabMap[fab][maqSelJuego][maqSelGameTitle];
          html+=`<div style="margin-top:10px;padding-left:36px">`;
          for(const pre of Object.keys(islaMap).sort()){
            const mdas=islaMap[pre].sort((a,b)=>a.localeCompare(b,"es",{numeric:true}));
            const iAc=mdas.reduce((s,m)=>s+(pm[m]?.toAc||0),0);
            const iTot=mdas.reduce((s,m)=>s+(pm[m]?.total||0),0);
            const iP=iTot>0?iAc/iTot:0;
            html+=`<div style="margin-bottom:10px">
              <div style="font-weight:700;margin-bottom:3px;font-size:13px">
                Isla ${pre} <span class="${pctClass(iP)}">${fmtP(iP)}</span>
                <span class="muted" style="font-weight:normal"> · ${mdas.length} máq.</span>
              </div>
              <table style="width:100%;font-size:12px;border-collapse:collapse"><tbody>`;
            for(const mda of mdas){
              const ms=state.master[mda]||{};
              const p=pm[mda]||{};
              html+=`<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:3px 8px;font-weight:700">${mda}</td>
                <td style="padding:3px 8px;color:var(--muted)">${ms.isla||"—"}</td>
                <td style="padding:3px 8px" class="${pctClass(p.pct||0)}">${(p.pct||0)>0?fmtP(p.pct):"—"}</td>
                <td style="padding:3px 8px;color:var(--muted)">${fmtN(p.total||0)}</td>
                ${(p.score||0)>0?`<td style="color:var(--high);padding:3px 8px">⚠</td>`:`<td></td>`}
              </tr>`;
            }
            html+=`</tbody></table></div>`;
          }
          html+=`</div>`;
        }
      }
    }
    html+=`</div>`;
  }
  el.innerHTML=`<div class="card"><h2>Aceptación por fabricante de máquina</h2>
    <div class="row"><label class="fld">Semana <select id="maqSel" onchange="renderMaquinas()">${state.weekOrder.map(w=>`<option value="${w}" ${w===d?"selected":""}>${fmtKeyFull(w)}</option>`).join("")}</select></label></div>
    ${html}</div>`;
}
function maqToggleFab(fab){
  if(maqSelFab===fab){maqSelFab="";maqSelJuego="";maqSelGameTitle="";}
  else{maqSelFab=fab;maqSelJuego="";maqSelGameTitle="";}
  renderMaquinas();
}
function maqToggleJuego(mmq,fab){
  maqSelFab=fab;
  if(maqSelJuego===mmq){maqSelJuego="";maqSelGameTitle="";}
  else{maqSelJuego=mmq;maqSelGameTitle="";}
  renderMaquinas();
}
function maqToggleGame(jue,mmq,fab){
  maqSelFab=fab; maqSelJuego=mmq;
  maqSelGameTitle=maqSelGameTitle===jue?"":jue;
  renderMaquinas();
}

// ---------- Buscador ----------
let busMDAVal="", busIslaVal="";
function busOnInput(field,val){
  if(field==="mda"){ busMDAVal=val; busIslaVal=""; }
  else { busIslaVal=val; busMDAVal=""; }
  renderBuscador(field);
}
function renderBuscador(focusField){
  const el=document.getElementById("tab-buscador");
  const calcs=state.weekOrder.length?allCalcs():{};
  let resMDA="", resIsla="";
  if(busMDAVal){
    const q=busMDAVal.trim();
    const allMdas=new Set(state.weekOrder.flatMap(d=>state.weeks[d].rows.map(r=>r.mda)));
    const hits=[...allMdas].filter(m=>m.includes(q)).slice(0,20);
    if(!hits.length) resMDA='<div class="card muted">Sin resultados para MDA.</div>';
    for(const mda of hits){
      const ms=state.master[mda]||{};
      let hist="";
      for(const d of visibleWeeks()){
        const mm=calcs[d]?.rows.find(r=>r.mda===mda);
        hist+=(mm&&mm.pct>0)?`<td class="${pctClass(mm.pct)}">${fmtP(mm.pct)}<br><span class="muted">${fmtN(mm.total)}</span></td>`:`<td class="muted">—</td>`;
      }
      resMDA+=`<div class="card"><h2>MDA ${mda}</h2>
        <div class="kpis">
          <div class="kpi"><div class="v" style="font-size:16px">${getLoc(mda)||"—"}</div><div class="l">ISLA</div></div>
          <div class="kpi"><div class="v" style="font-size:14px">${ms.modelo||"—"}</div><div class="l">Modelo billetero</div></div>
          <div class="kpi"><div class="v" style="font-size:13px">${ms.firm||"—"}</div><div class="l">Firmware</div></div>
          <div class="kpi"><div class="v" style="font-size:14px">${ms.juego||"—"}</div><div class="l">Juego</div></div>
          <div class="kpi"><div class="v" style="font-size:14px">${ms.fabricante||"—"}</div><div class="l">Fabricante</div></div>
        </div>
        <div class="tblWrap" style="margin-top:8px;max-height:100px"><table>
          <thead><tr>${visibleWeeks().map(d=>`<th>${fmtKey(d)}</th>`).join("")}</tr></thead>
          <tbody><tr>${hist}</tr></tbody></table></div></div>`;
    }
  }
  if(busIslaVal){
    const q=busIslaVal.trim().toLowerCase();
    const islas=[...new Set(Object.values(state.master).map(m=>m.isla||"").filter(Boolean))]
      .filter(i=>i.toLowerCase().includes(q)||islaPrefix(i).toLowerCase().includes(q)).sort();
    // agrupar islas por prefix (isla real) si búsqueda es por prefijo
    const prefixes=[...new Set(islas.map(islaPrefix))];
    if(!prefixes.length) resIsla='<div class="card muted">Sin resultados para ISLA.</div>';
    for(const prefix of prefixes){
      const mdas=Object.entries(state.master).filter(([,ms])=>islaPrefix(ms.isla||"")===prefix).map(([mda])=>mda);
      let histHead="", histBody="";
      for(const d of visibleWeeks()){
        const wRows=calcs[d]?.rows.filter(m=>mdas.includes(m.mda)&&m.pct>0&&m.total>0)||[];
        const islaAvg=wRows.length?avg(wRows.map(m=>m.pct)):null;
        histHead+=`<th>${fmtKey(d)}</th>`;
        histBody+=islaAvg!=null?`<td class="${pctClass(islaAvg)}"><b>${fmtP(islaAvg)}</b><br><span class="muted">${wRows.length} máq</span></td>`:`<td class="muted">—</td>`;
      }
      let machRows="";
      for(const mda of mdas.sort((a,b)=>a.localeCompare(b,"es",{numeric:true}))){
        const ms=state.master[mda]||{};
        let hist="";
        for(const d of visibleWeeks()){
          const mm=calcs[d]?.rows.find(r=>r.mda===mda);
          hist+=(mm&&mm.pct>0)?`<td class="${pctClass(mm.pct)}">${fmtP(mm.pct)}<br><span class="muted">${fmtN(mm.total)}</span></td>`:`<td class="muted">—</td>`;
        }
        machRows+=`<tr><td class="left"><b>${mda}</b></td><td class="left">${getLoc(mda)}</td><td class="left">${ms.modelo||"—"}</td><td class="left" style="font-size:10px">${ms.firm||"—"}</td>${hist}</tr>`;
      }
      resIsla+=`<div class="card"><h2>Isla ${prefix} — ${mdas.length} máquinas</h2>
        <div class="hint" style="margin-bottom:6px">Promedio de la isla por semana:</div>
        <div class="tblWrap" style="max-height:60px;margin-bottom:8px"><table><thead><tr>${histHead}</tr></thead><tbody><tr>${histBody}</tr></tbody></table></div>
        <div class="tblWrap" style="max-height:260px"><table id="tblIsla_${prefix}">
          <thead><tr><th class="left sortable">MDA</th><th class="left sortable">ISLA</th><th class="left sortable">Modelo</th><th class="left sortable">Firm</th>${visibleWeeks().map(d=>`<th class="sortable">${fmtKey(d)}</th>`).join("")}</tr></thead>
          <tbody>${machRows}</tbody></table></div></div>`;
      setTimeout(()=>attachSort(`tblIsla_${prefix}`),0);
    }

function importMasterJSON(payload){
  // soporta tanto el formato antiguo (array) como el nuevo (objeto con master+hist)
  const rows=Array.isArray(payload)?payload:(payload.master||[]);
  let n=0;
  for(const row of rows){
    if(!row.mda)continue;
    const mda=String(row.mda).trim();
    state.master[mda]={...(state.master[mda]||{}),
      isla:row.isla||state.master[mda]?.isla||"",
      locname:row.locname||state.master[mda]?.locname||"",
      fabricante:row.fabricante||state.master[mda]?.fabricante||"",
      modelmaq:row.modelmaq||state.master[mda]?.modelmaq||"",
      juego:row.juego||state.master[mda]?.juego||"",
      modelo:row.modelo||state.master[mda]?.modelo||"",
      firm:row.firm||state.master[mda]?.firm||"",
      area:row.area||state.master[mda]?.area||"",
      serial:row.serial||state.master[mda]?.serial||"",
      category:row.category||state.master[mda]?.category||"",
      deno:row.deno||state.master[mda]?.deno||""};
    n++;
  }
  if(!Array.isArray(payload)&&payload.hist){
    try{
      const h=JSON.parse(xorDec(payload.hist));
      if(Array.isArray(h)&&h.length){
        // merge: añade entradas que no existan por id
        const existIds=new Set(swapHistory.map(e=>e.id));
        let added=0;
        for(const e of h){ if(!existIds.has(e.id)){swapHistory.push(e);added++;} }
        if(added) saveHistory();
      }
    }catch(e){}
  }
  return n;
}

// ---------- Intercambios ----------
/*
  Fórmula de ganancia por intercambio de billeteros:
  Sea A = billetero bueno (pct alta) en isla de poco flujo
      B = billetero malo (pct baja) en isla de mucho flujo

  Si movemos el billetero de A a la posición de B (y viceversa):
    Estado actual:  totA*pctA + totB*pctB  (billetes aceptados total)
    Tras el swap:   totA*pctB + totB*pctA
    Ganancia neta = (pctA - pctB) * (totB - totA)

  Es positiva cuando pctA > pctB Y totB > totA.
  Se maximiza cuando la diferencia de calidad Y de volumen son grandes.
*/
let machEditFilter="";
let intFiltroMod="", intFiltroMinVol=0, intFabLeft=new Set(), intFabRight=new Set(), intUsarPromedio=false, intPendiente=null;

// Marcas que sólo pueden intercambiar entre sí (incompatibilidad física)
const RESTRICTED_BRANDS=new Set(["IGT"]);

function swapFabOk(fabA, fabB){
  // si alguna de las dos marcas está restringida, deben ser iguales entre sí
  if(RESTRICTED_BRANDS.has(fabA)||RESTRICTED_BRANDS.has(fabB)) return fabA===fabB;
  return true; // el resto puede intercambiarse libremente
}

function buildAvgRows(calcs,d){
  const idx=state.weekOrder.indexOf(d);
  const window4=state.weekOrder.slice(Math.max(0,idx-3),idx+1);
  const map={};
  for(const w of window4){
    for(const r of (calcs[w]?.rows||[])){
      if(!r.total)continue;
      if(!map[r.mda])map[r.mda]={toAc:0,totals:[],n:0};
      map[r.mda].toAc+=r.toAc;
      map[r.mda].totals.push(r.total);
      map[r.mda].n++;
    }
  }
  return Object.entries(map).map(([mda,v])=>{
    const avgTot=Math.round(v.totals.reduce((a,b)=>a+b,0)/v.totals.length);
    const avgAc=Math.round(v.toAc/v.n);
    return {mda, pct:avgTot>0?avgAc/avgTot:0, total:avgTot, nWeeks:v.n};
  });
}
function calcSwaps(rows){
  rows=rows.filter(m=>m.pct>0&&m.total>0);
  const results=[];
  for(let i=0;i<rows.length;i++){
    const A=rows[i];
    const msA=state.master[A.mda]||{};
    if(A.pct<state.params.thrOk)continue;
    for(let j=0;j<rows.length;j++){
      if(i===j)continue;
      const B=rows[j];
      const msB=state.master[B.mda]||{};
      if(B.pct>=state.params.thrOk)continue;
      if(B.total<=A.total)continue;
      // filtro fabricante: IGT↔IGT, resto libre
      if(!swapFabOk(msA.fabricante||"",msB.fabricante||""))continue;
      // filtro fabricante manual (dos paneles)
      if(intFabLeft.size>0||intFabRight.size>0){
        const fA=msA.fabricante||"", fB=msB.fabricante||"";
        const dir1=(intFabLeft.size===0||intFabLeft.has(fA))&&(intFabRight.size===0||intFabRight.has(fB));
        const dir2=(intFabLeft.size===0||intFabLeft.has(fB))&&(intFabRight.size===0||intFabRight.has(fA));
        if(!dir1&&!dir2)continue;
      }
      // filtro modelo billetero: no mezclar Advance con Cashflow
      if(intFiltroMod&&(msA.modelo!==intFiltroMod||msB.modelo!==intFiltroMod))continue;
      else if(!intFiltroMod&&msA.modelo&&msB.modelo&&msA.modelo!==msB.modelo)continue;
      if(B.total<intFiltroMinVol)continue;
      const gain=(A.pct-B.pct)*(B.total-A.total);
      results.push({
        mdaA:A.mda, locA:getLoc(A.mda), pctA:A.pct, totA:A.total, modA:msA.modelo||"—", firmA:msA.firm||"—", fabA:msA.fabricante||"—",
        mdaB:B.mda, locB:getLoc(B.mda), pctB:B.pct, totB:B.total, modB:msB.modelo||"—", firmB:msB.firm||"—", fabB:msB.fabricante||"—",
        gain: Math.round(gain)
      });
    }
  }
  results.sort((a,b)=>b.gain-a.gain);
  return results.slice(0,50);
}

function renderIntercambios(){
  const el=document.getElementById("tab-intercambios");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const calcs=allCalcs();
  const selD=document.getElementById("intSel")?.value;
  const d=state.weekOrder.includes(selD)?selD:state.weekOrder[state.weekOrder.length-1];
  const mods=[...new Set(Object.values(state.master).map(m=>m.modelo||"").filter(Boolean))];
  intFiltroMod=document.getElementById("intMod")?.value||"";
  intFiltroMinVol=parseInt(document.getElementById("intMinVol")?.value||"0")||0;
  intUsarPromedio=document.getElementById("intPromedio")?.checked??intUsarPromedio;

  // Calcular todas las combinaciones de fabricante posibles (sin filtro fab) para mostrar chips
  const allFabs=[...new Set(Object.values(state.master).map(m=>m.fabricante||"").filter(Boolean))].sort();
  // Pares posibles respetando la regla: IGT solo con IGT, resto libre
  const pairsSet=new Set();
  for(const fa of allFabs){
    for(const fb of allFabs){
      if(!swapFabOk(fa,fb))continue;
      const key=[fa,fb].sort().join("↔");
      pairsSet.add(key);
    }
  }
  const pairs=[...pairsSet].sort();
  // paneles izquierdo y derecho
  function fabPanelHtml(allFabs, selectedSet, otherSet, side){
    // compatibles con la selección del otro panel
    const compat=fab=>{
      if(otherSet.size===0) return true;
      return [...otherSet].every(o=>swapFabOk(fab,o));
    };
    const reset=`<button class="btn sm sec" style="margin:2px;opacity:.6" onclick="intResetFab('${side}')">✕ Limpiar</button>`;
    const chips=allFabs.map(f=>{
      const sel=selectedSet.has(f);
      const ok=compat(f);
      const dim=!ok&&!sel?"opacity:.3;cursor:not-allowed":"";
      return `<button class="btn sm ${sel?'':'sec'}" style="margin:2px;${dim}" onclick="${ok||sel?`intToggleFab('${side}','${f}')`:''}"\ntitle="${!ok?'Incompatible con la selección actual':''}">${f}</button>`;
    }).join("");
    return chips+(selectedSet.size>0?reset:"");
  }
  const leftPanel=fabPanelHtml(allFabs,intFabLeft,intFabRight,"left");
  const rightPanel=fabPanelHtml(allFabs,intFabRight,intFabLeft,"right");

  const useAvg=intUsarPromedio&&state.weekOrder.length>1;
  const swapRows=useAvg?buildAvgRows(calcs,d):calcs[d].rows;
  const nAvgWeeks=useAvg?Math.min(4,state.weekOrder.indexOf(d)+1):1;
  const swaps=calcSwaps(swapRows);
  let tbody="";
  swaps.forEach((s,i)=>{
    const sameF=s.fabA===s.fabB;
    tbody+=`<tr>
      <td style="color:var(--accent);font-weight:700">${i+1}</td>
      <td class="left"><b>${s.mdaA}</b><br><span class="muted">${s.locA}</span></td>
      <td class="left" style="font-size:10px">${s.fabA}<br>${s.modA} ${s.firmA}</td>
      <td class="${pctClass(s.pctA)}">${fmtP(s.pctA)}</td>
      <td class="muted">${fmtN(s.totA)}</td>
      <td style="font-size:16px;text-align:center">⇄</td>
      <td class="left"><b>${s.mdaB}</b><br><span class="muted">${s.locB}</span></td>
      <td class="left" style="font-size:10px">${s.fabB}<br>${s.modB} ${s.firmB}</td>
      <td class="${pctClass(s.pctB)}">${fmtP(s.pctB)}</td>
      <td>${fmtN(s.totB)}</td>
      <td style="color:var(--ok);font-weight:700">+${fmtN(s.gain)}</td>
      <td><button class="btn sm" onclick="intRegistrar(${i})">Registrar</button></td>
    </tr>`;
  });

  const isLoc=isLocal();
  const histRows=swapHistory.length?[...swapHistory].reverse().map(h=>`<tr>
    <td class="muted">${h.fecha}</td>
    <td class="left"><b>${h.mdaA}</b> ${h.locA}</td>
    <td class="left"><b>${h.mdaB}</b> ${h.locB}</td>
    <td>${h.modA}</td>
    <td class="${pctClass(h.pctA)}">${fmtP(h.pctA)}</td>
    <td class="${pctClass(h.pctB)}">${fmtP(h.pctB)}</td>
    <td style="color:var(--ok)">+${fmtN(h.gain)}</td>
    <td class="left muted">${h.nota||""}</td>
    <td><button class="btn sm danger" onclick="intEliminar(${h.id})">✕</button></td>
  </tr>`).join(""):`<tr><td colspan="9" class="muted" style="text-align:center;padding:12px">Sin historial</td></tr>`;

  el.innerHTML=`
  <div class="card"><h2>Optimizador de intercambios</h2>
    <p class="hint" style="margin-bottom:10px">
      <b>Fórmula:</b> Ganancia = (% billetero bueno − % billetero malo) × (volumen alto − volumen bajo)<br>
      Llevar un billetero de alto rendimiento a una posición de alto flujo maximiza los billetes aceptados globalmente.<br>
      ${!isLoc?'<span style="color:var(--high)">⚠ App abierta en modo online — el historial no se guarda.</span>':'<span style="color:var(--ok)">✓ Modo local — historial cifrado y guardado.</span>'}
    </p>
    <div class="row">
      <label class="fld">Semana <select id="intSel" onchange="renderIntercambios()">${state.weekOrder.map(w=>`<option value="${w}" ${w===d?"selected":""}>${fmtKeyFull(w)}</option>`).join("")}</select></label>
      <label class="fld">Modelo billetero <select id="intMod" onchange="renderIntercambios()">
        <option value="">Todos (mismo modelo)</option>
        ${mods.map(m=>`<option value="${m}" ${m===intFiltroMod?"selected":""}>${m}</option>`).join("")}
      </select></label>
      <label class="fld">Flujo mín. destino <input id="intMinVol" type="number" min="0" step="50" value="${intFiltroMinVol}" oninput="renderIntercambios()" style="width:90px"></label>
      <label class="fld" style="align-items:center;gap:6px" title="Promedia % y volumen de las últimas 4 semanas disponibles para mayor robustez. Si solo hay una semana, usa ese dato igual.">
        <input type="checkbox" id="intPromedio" onchange="renderIntercambios()" ${intUsarPromedio?"checked":""}> Promedio 4 semanas
        ${useAvg?`<span class="muted">(usando ${nAvgWeeks} sem.)</span>`:""}
      </label>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:12px">
      <div style="flex:1;background:var(--panel2);border-radius:8px;padding:10px">
        <div class="hint" style="margin-bottom:6px"><b>Origen</b> — fabricante(s) del billetero bueno</div>
        ${leftPanel}
      </div>
      <div style="display:flex;align-items:center;font-size:20px;color:var(--accent)">⇄</div>
      <div style="flex:1;background:var(--panel2);border-radius:8px;padding:10px">
        <div class="hint" style="margin-bottom:6px"><b>Destino</b> — fabricante(s) del billetero malo <span style="color:var(--high);font-size:10px">(IGT solo con IGT)</span></div>
        ${rightPanel}
      </div>
    </div>
    <div class="tblWrap" style="max-height:55vh"><table id="tblSwaps">
      <thead><tr>
        <th>#</th>
        <th class="left">Billetero A (bueno)</th><th class="left">Modelo/Firm</th><th class="sortable">%A</th><th class="sortable">Flujo A</th>
        <th></th>
        <th class="left">Posición B (problema)</th><th class="left">Modelo/Firm</th><th class="sortable">%B</th><th class="sortable">Flujo B</th>
        <th class="sortable">Ganancia est.</th><th></th>
      </tr></thead><tbody>${tbody||`<tr><td colspan="12" class="muted" style="text-align:center;padding:12px">Sin sugerencias con estos filtros.</td></tr>`}</tbody>
    </table></div>
    <p class="hint" style="margin-top:6px">Ganancia estimada = billetes extra aceptados por semana si el billetero bueno ocupa la posición de alto flujo.</p>
  </div>

  <div id="intFormWrap"></div>

  <div class="card"><h2>Historial de intercambios ${!isLoc?'<span style="color:var(--high);font-size:11px">(sólo lectura — sin persistencia online)</span>':''}</h2>
    <div class="tblWrap" style="max-height:40vh"><table id="tblHist">
      <thead><tr>
        <th class="sortable">Fecha</th><th class="left sortable">Billetero A</th><th class="left sortable">Posición B</th>
        <th class="sortable">Modelo</th><th class="sortable">%A</th><th class="sortable">%B</th>
        <th class="sortable">Ganancia est.</th><th class="left">Nota</th><th></th>
      </tr></thead><tbody>${histRows}</tbody>
    </table></div>
    ${isLoc?`<div class="row" style="margin-top:8px"><button class="btn sec sm" onclick="intExportarJSON()">⬇ Exportar historial JSON</button></div>`:''}
  </div>`;
  attachSort("tblSwaps"); attachSort("tblHist");
  // guardar referencia a los swaps para poder registrarlos
  window._lastSwaps=swaps;
}

function intRegistrar(i){
  const s=window._lastSwaps?.[i]; if(!s)return;
  document.getElementById("intFormWrap").innerHTML=`
  <div class="card" style="border-color:var(--accent)"><h2>Registrar intercambio</h2>
    <div class="grid2" style="margin-bottom:10px">
      <div>
        <div class="hint">Billetero que se <b>mueve</b> (bueno, bajo flujo)</div>
        <div style="margin-top:4px"><b>${s.mdaA}</b> — ${s.locA} — ${s.modA} — Firm: ${s.firmA}</div>
        <div style="color:var(--ok)">${fmtP(s.pctA)} · ${fmtN(s.totA)} bills/semana</div>
      </div>
      <div>
        <div class="hint">Posición <b>destino</b> (mala, alto flujo)</div>
        <div style="margin-top:4px"><b>${s.mdaB}</b> — ${s.locB} — ${s.modB} — Firm: ${s.firmB}</div>
        <div style="color:var(--crit)">${fmtP(s.pctB)} · ${fmtN(s.totB)} bills/semana</div>
      </div>
    </div>
    <div class="row">
      <label class="fld">Fecha <input id="intFecha" type="date" value="${new Date().toISOString().slice(0,10)}" style="cursor:text"></label>
      <label class="fld" style="flex:1">Nota / motivo <input id="intNota" placeholder="Ej: Intervención preventiva sector 3" style="cursor:text;width:100%"></label>
    </div>
    <div class="row">
      <button class="btn" onclick="intConfirmar(${JSON.stringify(s).replace(/"/g,'&quot;')})">✓ Confirmar y guardar</button>
      <button class="btn sec" onclick="document.getElementById('intFormWrap').innerHTML=''">Cancelar</button>
    </div>
  </div>`;
  document.getElementById("intFormWrap").scrollIntoView({behavior:"smooth"});
}

async function intConfirmar(s){
  const fecha=document.getElementById("intFecha")?.value||new Date().toISOString().slice(0,10);
  const nota=document.getElementById("intNota")?.value||"";
  swapHistory.push({id:Date.now(),fecha,nota,
    mdaA:s.mdaA,locA:s.locA,pctA:s.pctA,totA:s.totA,modA:s.modA,firmA:s.firmA,
    mdaB:s.mdaB,locB:s.locB,pctB:s.pctB,totB:s.totB,modB:s.modB,firmB:s.firmB,
    gain:s.gain});
  await saveHistory();
  renderIntercambios();
}

function intToggleFab(side,fab){
  const s=side==="left"?intFabLeft:intFabRight;
  s.has(fab)?s.delete(fab):s.add(fab);
  renderIntercambios();
}
function intResetFab(side){
  (side==="left"?intFabLeft:intFabRight).clear();
  renderIntercambios();
}

async function intEliminar(id){
  if(!confirm("¿Eliminar este registro del historial?"))return;
  swapHistory=swapHistory.filter(h=>h.id!==id);
  await saveHistory();
  renderIntercambios();
}

function intExportarJSON(){
  const blob=new Blob([JSON.stringify(swapHistory,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`reacbill_intercambios_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// ---------- Init ----------
function renderAll(){
  renderParamsBar(); renderLoadedInfo();
  showTab(activeTab);
}
(async function(){
  buildNav(); buildShells();
  await loadState();
  await loadHistory();
  sortWeeks();
  renderAll();
  if(state.weekOrder.length) showTab("resumen"); else showTab("carga");
})();
</script>
