<style>

  --bg:#0f1420; --panel:#1a2233; --panel2:#222d44; --border:#2e3b58;
  --text:#e8edf7; --muted:#8fa0c0; --accent:#4f8ff7; --ok:#2ecc71;

}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

<body>
<header>
  <div style="display:flex;align-items:baseline;gap:6px">
    <h1>REACBILL <span class="ver">v1.5.0-main</span></h1>
    <span id="dataInfo" class="ver"></span>
  </div>
  <div id="statsBar"></div>
  <div id="paramsBar"></div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>

<script>
/* ===== REACBILL v1.5.0-main ===== */
const VERSION = "1.5.0-main";
const LS_KEY  = "reacbill_v1";

let state = {
  weeks:     {},
  weekOrder: [],
  master:    {},
  params: {
    thrOk:0.85, thrMid:0.90, thrCrit:0.40,
    multMid:3,  multCrit:30,
    sevMid:10,  sevHigh:50, sevCrit:150
  }
};

const DENOS = ["20000","10000","5000","2000","1000","SIN_DENO"];

// ---------- Persistencia ----------
function idb(){return new Promise((res,rej)=>{
  const r=indexedDB.open("reacbill",2);
  r.onupgradeneeded=e=>{ try{e.target.result.createObjectStore("kv");}catch(x){} };
  r.onsuccess=e=>res(e.target.result); r.onerror=rej;
});}
async function saveState(){
  const db=await idb();
  return new Promise((res,rej)=>{
    const tx=db.transaction("kv","readwrite");
    tx.objectStore("kv").put(JSON.stringify(state),LS_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function loadState(){
  try{
    const db=await idb();
    return new Promise(res=>{
      const rq=db.transaction("kv").objectStore("kv").get(LS_KEY);
      rq.onsuccess=()=>{
        if(rq.result){ const s=JSON.parse(rq.result); state={...state,...s,params:{...state.params,...s.params}}; }
        res();
      };
      rq.onerror=()=>res();
    });
  }catch(e){}
}

// ---------- Cálculos ----------
function weekCalc(week, params){
  const out=[]; let sumT=0,nT=0;
  for(const r of week.rows){
    const toAc=DENOS.reduce((s,d)=>s+(r.acc[d]||0),0);
    const toRe=DENOS.reduce((s,d)=>s+(r.rej[d]||0),0);
    const total=toAc+toRe;
    const pct=(r.pctBill!=null&&r.pctBill>0)?r.pctBill:(total>0?toAc/total:null);
    if(total>0){sumT+=total;nT++;}
    out.push({...r,toAc,toRe,total,pct});
  }
  const avgT=nT?sumT/nT:1;
  for(const m of out){
    if(!m.pct||m.pct>=params.thrOk){ m.score=0; }
    else{
      const mult=m.pct<params.thrCrit?params.multCrit:(m.pct<params.thrMid?params.multMid:1);
      m.score=m.total*(1+Math.log10(m.total))*((params.thrOk-m.pct)/params.thrOk)*(m.total/avgT)*mult;
    }
  }
  const withPct=out.filter(m=>m.pct>0&&m.total>0);
  // agrupar por modelo dinámico
  const modMap={};
  for(const m of withPct){
    const mod=(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)";
    (modMap[mod]=modMap[mod]||[]).push(m.pct);
  }
  const avgByMod={};
  for(const mod in modMap) avgByMod[mod]=avg(modMap[mod]);
  const avgPct=avg(withPct.map(m=>m.pct));
  return {
    rows:out, avgT, avgPct,
    avgAdv: avgByMod["Advance"]||0,
    avgCf:  avgByMod["Cashflow"]||0,
    cntAdv: (modMap["Advance"]||[]).length,
    cntCf:  (modMap["Cashflow"]||[]).length,
    avgByMod, modMap,
    totBill: out.reduce((s,m)=>s+m.total,0),
    totAc:   out.reduce((s,m)=>s+m.toAc,0),
    totRe:   out.reduce((s,m)=>s+m.toRe,0)
  };
}
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
function sevClass(sc,p){if(sc<=0)return"ok";if(sc>=p.sevCrit)return"cr";if(sc>=p.sevHigh)return"hi";if(sc>=p.sevMid)return"mid";return"ok";}
const SEVLBL={ok:"OK",mid:"Medio",hi:"Alto",cr:"Urgente"};

let calcCache=null;
function allCalcs(){
  if(calcCache)return calcCache;
  const r={};
  for(const d of state.weekOrder) r[d]=weekCalc(state.weeks[d],state.params);
  calcCache=r; return r;
}
function invalidate(){calcCache=null;}

// ---------- Formato ----------
const fmtP=v=>v==null||isNaN(v)?"—":(v*100).toFixed(2)+"%";
const fmtN=v=>v==null||isNaN(v)?"—":Math.round(v).toLocaleString("es-CL");
const fmt1=v=>v==null||isNaN(v)?"—":v.toFixed(1);
function pctClass(p){
  if(!p||p<=0)return"";
  const pr=state.params;
  if(p<pr.thrCrit)return"c-cr";if(p<pr.thrOk)return"c-hi";if(p<pr.thrMid)return"c-mid";return"c-ok";
}

// ---------- Sort genérico ----------
const sortStates={};
function thColIndex(th){
  const thead=th.closest("thead"); if(!thead)return th.cellIndex;
  const grid=[];
  [...thead.rows].forEach((tr,r)=>{
    grid[r]=grid[r]||[];
    let c=0;
    [...tr.cells].forEach(cell=>{
      while(grid[r][c]!==undefined)c++;
      for(let rr=0;rr<(cell.rowSpan||1);rr++){
        grid[r+rr]=grid[r+rr]||[];
        for(let cc=0;cc<(cell.colSpan||1);cc++)grid[r+rr][c+cc]=cell;
      }
      c+=cell.colSpan||1;
    });
  });
  for(const row of grid){const i=row.indexOf(th);if(i>=0)return i;}
  return th.cellIndex;
}
function sortVal(s){
  if(!s||s==="—")return null;
  if(s.includes("%"))return parseFloat(s.replace(/[+%]/g,""));
  if(/^-?\d{1,3}(\.\d{3})+$/.test(s))return parseFloat(s.replace(/\./g,""));
  const n=parseFloat(s.replace(",","."));
  return isNaN(n)?null:n;
}
function attachSort(tableId){
  const tbl=document.getElementById(tableId); if(!tbl)return;
  tbl.querySelectorAll("th.sortable").forEach(th=>{
    if(th.getAttribute("onclick"))return;
    th.addEventListener("click",()=>{
      const col=thColIndex(th);
      const st=sortStates[tableId]||{col:-1,dir:1};
      const dir=(st.col===col)?-st.dir:1;
      sortStates[tableId]={col,dir};
      tbl.querySelectorAll("th.sortable").forEach(h=>h.classList.remove("s-asc","s-desc"));
      th.classList.add(dir===1?"s-asc":"s-desc");
      const tbody=tbl.tBodies[0]; if(!tbody)return;
      const rows=[...tbody.querySelectorAll("tr:not(.no-sort)")];
      rows.sort((a,b)=>{
        const av=a.cells[col]?.textContent.trim()||"";
        const bv=b.cells[col]?.textContent.trim()||"";
        const an=sortVal(av), bn=sortVal(bv);
        if(an!=null&&bn!=null) return(an-bn)*dir;
        if(an!=null)return -1; if(bn!=null)return 1;
        return av.localeCompare(bv,"es",{numeric:true})*dir;
      });
      rows.forEach(r=>tbody.appendChild(r));
    });
  });
}

// ---------- Parseo ----------
function fmtLocname(loc){
  const s=String(loc).trim();
  return s.length>2?s.slice(0,s.length-2)+"-"+s.slice(-2):s;
}
function getLoc(mda){
  const m=state.master[mda]; if(!m)return"";
  return m.isla||(m.locname?fmtLocname(m.locname):"");
}
function getMod(mda){ return (state.master[mda]?.modelo||"").trim(); }
function getFirm(mda){ return (state.master[mda]?.firm||"").trim(); }
function dateKeyFromName(name){
  let m=name.match(/(\d{4})[-_.](\d{2})[-_.](\d{2})/);
  if(m)return`${m[1]}-${m[2]}-${m[3]}`;
  m=name.match(/(\d{2})[-_.](\d{2})[-_.](\d{4})/);
  if(m)return`${m[3]}-${m[2]}-${m[1]}`;
  return name.replace(/\.[^.]+$/,"").slice(0,10);
}
function fmtKey(k){
  const m=k.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m?`${m[3]}-${m[2]}`:k;
}
function fmtKeyFull(k){
  const m=k.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m?`${m[3]}/${m[2]}/${m[1]}`:k;
}
function sortWeeks(){
  state.weekOrder=Object.keys(state.weeks).sort((a,b)=>a.localeCompare(b));
}

function parseCnText(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return 0;
  const sep=lines[0].includes(";")?";":"\t";
  const hdr=lines[0].split(sep).map(h=>h.trim().toUpperCase());
  const iS=hdr.indexOf("SMDBID"),iL=hdr.indexOf("LOCNAME");
  if(iS<0||iL<0)return 0;
  let n=0;
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(sep);
    if(c.length<=Math.max(iS,iL))continue;
    const mda=c[iS].trim(),loc=c[iL].trim();
    if(!mda||!loc||loc==="err")continue;
    state.master[mda]={...(state.master[mda]||{}),locname:loc,isla:fmtLocname(loc)};
    n++;
  }
  return n;
}

function parseDataSheet(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  if(!arr.length)return null;
  const hdr=arr[0].map(h=>String(h??"").trim());
  const idx={maq:-1,tA:-1,tR:-1,ses:-1,pT:-1,pB:-1,acc:{},rej:{}};
  hdr.forEach((h,i)=>{
    const hl=h.toLowerCase();
    if(hl==="maquina"||hl==="máquina"||hl==="mda"||hl==="smdbid") idx.maq=i;
    else if(/^tarjeta acepta/i.test(h)) idx.tA=i;
    else if(/^tarjeta rechaza/i.test(h)) idx.tR=i;
    else if(/sesion/i.test(h)) idx.ses=i;
    else if(/aceptaci[oó]n tarjeta/i.test(h)) idx.pT=i;
    else if(/aceptaci[oó]n billetes?/i.test(h)) idx.pB=i;
    else if(/billete aceptado/i.test(h)){const d=h.replace(/billete aceptado/i,"").trim()||"SIN_DENO";idx.acc[d]=i;}
    else if(/billete rechazado/i.test(h)){const d=h.replace(/billete rechazado/i,"").trim()||"SIN_DENO";idx.rej[d]=i;}
  });
  if(idx.maq<0)return null;
  const rows=[];
  for(let r=1;r<arr.length;r++){
    const row=arr[r]; if(!row)continue;
    const mda=String(row[idx.maq]??"").trim();
    if(!mda||mda==="0"||mda==="err"||!/^\d+$/.test(mda))continue;
    const num=i=>i>=0&&row[i]!=null?Number(row[i])||0:0;
    const pNum=i=>i>=0&&row[i]!=null&&row[i]!==""?Number(row[i]):NaN;
    const acc={},rej={};
    for(const d in idx.acc)acc[d]=num(idx.acc[d]);
    for(const d in idx.rej)rej[d]=num(idx.rej[d]);
    const pB=pNum(idx.pB);
    rows.push({mda,tarjAc:num(idx.tA),tarjRe:num(idx.tR),sesiones:num(idx.ses),
      acc,rej,pctTarj:pNum(idx.pT),pctBill:isNaN(pB)?null:pB});
    if(!state.master[mda])state.master[mda]={isla:"",fabricante:"",juego:"",modelo:"",firm:""};
  }
  return rows.length?{rows}:null;
}

function parseContadores(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  const hdr=(arr[0]||[]).map(h=>String(h??"").trim().toUpperCase());
  const iId=hdr.indexOf("SMDBID"),iLoc=hdr.indexOf("LOCNAME"),
        iMan=hdr.findIndex(h=>h.startsWith("MANUF")),iJue=hdr.indexOf("JUEGO");
  if(iId<0)return 0;
  let n=0;
  for(let r=1;r<arr.length;r++){
    const row=arr[r]; if(!row||row[iId]==null)continue;
    const mda=String(row[iId]).trim(); if(!mda)continue;
    const loc=iLoc>=0?String(row[iLoc]??"").trim():"";
    state.master[mda]={...(state.master[mda]||{}),
      locname:loc, isla:loc?fmtLocname(loc):"",
      fabricante:iMan>=0?String(row[iMan]??"").trim():"",
      juego:iJue>=0?String(row[iJue]??"").trim():""};
    n++;
  }
  return n;
}

function parseSeguimientoModelos(ws){
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  let n=0;
  for(let r=4;r<arr.length;r++){
    const row=arr[r]; if(!row)continue;
    const mda=String(row[0]??"").trim(); if(!mda||!/^\d+$/.test(mda))continue;
    const fab=String(row[1]??"").trim();
    const mod=String(row[2]??"").trim();
    const firm=String(row[3]??"").trim();
    const isla=String(row[4]??"").trim();
    state.master[mda]={...(state.master[mda]||{}),
      fabricante:fab||state.master[mda]?.fabricante||"",
      modelo:mod||state.master[mda]?.modelo||"",
      firm:firm||state.master[mda]?.firm||"",
      isla:isla||state.master[mda]?.isla||""};
    if(mod)n++;
  }
  return n;
}

async function handleFiles(files){
  const log=[];
  for(const f of files){
    try{
      const ext=(f.name.match(/\.([^.]+)$/)||["",""])[1].toLowerCase();
      const isExcel=["xlsx","xls","xlsm","xlsb"].includes(ext);
      if(!isExcel){
        let text;
        try{ text=await f.text(); }catch(e){ text=""; }
        if((text.includes("SMDBID")||text.includes("LOCNAME"))&&text.includes(";")){
          const n=parseCnText(text);
          if(n>0){
            log.push(`${f.name}: ${n} ubicaciones cargadas (cn)`);
            await saveState(); renderAll();
            document.getElementById("uplog").innerHTML=log.map(l=>"• "+l).join("<br>");
            continue;
          }
        }
        if(ext&&!["csv","txt","tsv"].includes(ext)){
          log.push(`${f.name}: formato no reconocido`); continue;
        }
      }
      const wb=XLSX.read(await f.arrayBuffer(),{type:"array"});
      const masterSheets=wb.SheetNames.filter(n=>/^\d{2}-\d{2}$/.test(n));
      if(masterSheets.length){
        let imp=0;
        for(const sn of masterSheets){
          const wk=parseDataSheet(wb.Sheets[sn]);
          if(wk){
            const [dd,mm]=sn.split("-").map(Number);
            const now=new Date(); let yr=now.getFullYear();
            if(mm>now.getMonth()+1)yr--;
            const key=`${yr}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
            state.weeks[key]=wk; imp++;
          }
        }
        if(wb.Sheets["Contadores"])log.push("Contadores: "+parseContadores(wb.Sheets["Contadores"])+" máquinas");
        if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
        log.push(`${f.name}: ${imp} semanas históricas importadas`);
      } else {
        let sn=wb.SheetNames.find(n=>/ultima/i.test(n));
        if(!sn){ for(const c of wb.SheetNames){ if(parseDataSheet(wb.Sheets[c])){sn=c;break;} } }
        const wk=sn?parseDataSheet(wb.Sheets[sn]):null;
        if(wk){
          const key=dateKeyFromName(f.name);
          state.weeks[key]=wk;
          log.push(`${f.name} → ${fmtKeyFull(key)} (${wk.rows.length} máq., hoja: ${sn})`);
        } else log.push(`${f.name}: formato de datos no reconocido`);
        if(wb.Sheets["Contadores"])log.push("Contadores: "+parseContadores(wb.Sheets["Contadores"])+" máquinas");
        if(wb.Sheets["Seguimiento"])parseSeguimientoModelos(wb.Sheets["Seguimiento"]);
      }
    }catch(e){ log.push(`${f.name}: ERROR — ${e.message}`); }
  }
  sortWeeks(); invalidate(); await saveState(); renderAll();
  const ul=document.getElementById("uplog");
  if(ul)ul.innerHTML=log.map(l=>"• "+l).join("<br>");
}

// ---------- UI ----------
const TABS=[
 ["carga","📂 Carga"],["resumen","📊 Resumen"],["fecha","📅 Por Fecha"],
 ["ranking","🚨 Gravedad"],["tendencias","📈 Tendencias"],
 ["modelos","🔧 Modelos"],["levantamiento","📋 Levantamiento"],
 ["denominaciones","💵 Denominaciones"],

// ---------- Resumen ----------
let resSortState=null;
let resFiltroVal="";
function resSort(wk,field){
  if(resSortState&&resSortState.wk===wk&&resSortState.field===field) resSortState.dir*=-1;
  else resSortState={wk,field,dir:field==="pct"?1:-1};
  renderResBody();
}
function renderResumen(){
  const el=document.getElementById("tab-resumen");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  el.innerHTML=`<div class="card"><h2>Resumen histórico</h2>
    <div class="row">
      <input id="resFiltro" placeholder="Filtrar MDA / ISLA / Modelo" value="${resFiltroVal.replace(/"/g,'&quot;')}"
        oninput="resFiltroVal=this.value;renderResBody();" style="width:280px;cursor:text">
      <span class="hint">Click en % o Total para ordenar por semana</span>
    </div>
    <div id="resTblWrap"></div></div>`;
  renderResBody();
}
function renderResBody(){
  const wrap=document.getElementById("resTblWrap"); if(!wrap)return;
  const calcs=allCalcs(), weeks=state.weekOrder;
  const mdaMap=new Map();
  for(const d of weeks) for(const m of calcs[d].rows){
    if(!mdaMap.has(m.mda))mdaMap.set(m.mda,{});
    mdaMap.get(m.mda)[d]=m;
  }
  const ss=resSortState;
  // 4 sticky cols: MDA, ISLA, Modelo, Firm
  const sCols=`<th class="s1 left sortable">MDA</th><th class="s2 left sortable">ISLA</th><th class="s3 left sortable">Modelo</th><th class="s4 left sortable">Firm</th>`;
  let head=`<tr>${sCols}`;
  let head2=`<tr><th class="s1"></th><th class="s2"></th><th class="s3"></th><th class="s4"></th>`;
  for(const d of weeks){
    const ps=ss&&ss.wk===d&&ss.field==="pct", ts=ss&&ss.wk===d&&ss.field==="tot";
    head+=`<th colspan="2" style="text-align:center">${fmtKey(d)}</th>`;
    head2+=`<th class="sortable ${ps?(ss.dir===1?"s-asc":"s-desc"):""}" onclick="resSort('${d}','pct')">%</th>`;
    head2+=`<th class="sortable ${ts?(ss.dir===1?"s-asc":"s-desc"):""}" onclick="resSort('${d}','tot')">Total</th>`;
  }
  head+="</tr>"; head2+="</tr>";
  const filtro=resFiltroVal.toLowerCase();
  let mdaList=[...mdaMap.keys()];
  if(ss){
    mdaList.sort((a,b)=>{
      const ma=mdaMap.get(a)[ss.wk], mb=mdaMap.get(b)[ss.wk];
      const va=ma&&ma.pct>0?(ss.field==="pct"?ma.pct:ma.total):(ss.dir===1?-1:Infinity);
      const vb=mb&&mb.pct>0?(ss.field==="pct"?mb.pct:mb.total):(ss.dir===1?-1:Infinity);
      return(va-vb)*ss.dir;
    });
  } else mdaList.sort();
  let body="";
  for(const mda of mdaList){
    const loc=getLoc(mda), mod=getMod(mda), firm=getFirm(mda);
    if(filtro&&!(mda+loc+mod+firm).toLowerCase().includes(filtro))continue;
    let tr=`<td class="s1 left"><b>${mda}</b></td><td class="s2 left muted">${loc}</td><td class="s3 left muted">${mod}</td><td class="s4 left muted" style="font-size:10px">${firm}</td>`;
    for(const d of weeks){
      const m=mdaMap.get(mda)?.[d];
      if(m&&m.pct>0) tr+=`<td class="${pctClass(m.pct)}">${fmtP(m.pct)}</td><td>${fmtN(m.total)}</td>`;
      else tr+=`<td></td><td></td>`;
    }
    body+=`<tr>${tr}</tr>`;
  }
  wrap.innerHTML=`<div class="tblWrap" style="max-height:75vh"><table id="tblResumen">
    <thead>${head}${head2}</thead><tbody>${body}</tbody></table></div>`;
  attachSort("tblResumen");
}

function renderModelos(){
  const el=document.getElementById("tab-modelos");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const calcs=allCalcs();
  const sel=document.getElementById("modSel")?.value;
  const d=state.weekOrder.includes(sel)?sel:state.weekOrder[state.weekOrder.length-1];
  const c=calcs[d];
  // agrupar por modelo
  const groups={};
  for(const m of c.rows){
    const mod=(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)";
    const g=groups[mod]=groups[mod]||{n:0,tot:0,ac:0,re:0,pcts:[],alert:0,mdas:[]};
    g.n++; g.tot+=m.total; g.ac+=m.toAc; g.re+=m.toRe; g.mdas.push(m.mda);
    if(m.pct>0)g.pcts.push(m.pct); if(m.score>0)g.alert++;
  }
  const rows=Object.entries(groups).sort((a,b)=>b[1].tot-a[1].tot);
  let body=rows.map(([mod,g])=>`
    <tr><td class="left"><b>${mod}</b></td><td>${g.n}</td><td>${fmtN(g.tot)}</td><td>${fmtN(g.re)}</td>
    <td class="${pctClass(avg(g.pcts))}">${fmtP(avg(g.pcts))}</td>
    <td class="${pctClass(g.tot>0?g.ac/g.tot:0)}">${g.tot>0?fmtP(g.ac/g.tot):"—"}</td>
    <td>${g.alert}</td></tr>`).join("");
  // tendencia histórica por modelo
  const allMods=[...new Set(state.weekOrder.flatMap(d2=>
    calcs[d2].rows.map(m=>(state.master[m.mda]?.modelo||"(sin dato)").trim()||"(sin dato)")))].sort();
  const colors=["#2ecc71","#f1c40f","#4f8ff7","#e74c3c","#9b59b6","#1abc9c"];
  const lbl=state.weekOrder.map(fmtKey);
  const datasets=allMods.map((mod,i)=>({
    label:mod,
    data:state.weekOrder.map(d2=>{
      const rows2=calcs[d2].rows.filter(m=>(state.master[m.mda]?.modelo||"(sin dato)").trim()===mod&&m.pct>0);
      return rows2.length?+(avg(rows2.map(m=>m.pct))*100).toFixed(2):null;
    }),
    borderColor:colors[i%colors.length],tension:.3,spanGaps:true
  }));
  el.innerHTML=`<div class="card"><h2>Comparativa por modelo de billetero</h2>
    <div class="row"><label class="fld">Semana <select id="modSel" onchange="renderModelos()">${state.weekOrder.map(w=>`<option value="${w}" ${w===d?"selected":""}>${fmtKeyFull(w)}</option>`).join("")}</select></label></div>
    <div class="tblWrap" style="max-height:40vh"><table id="tblMod">
      <thead><tr><th class="left sortable">Modelo</th><th class="sortable">Máq.</th><th class="sortable">Total</th><th class="sortable">Rechazos</th><th class="sortable">% prom.</th><th class="sortable">% ponder.</th><th class="sortable">Alertas</th></tr></thead>
      <tbody>${body}</tbody></table></div></div>
    <div class="card" style="margin-top:12px"><h2>Tendencia % por modelo</h2><canvas id="cvModTrend" style="max-height:280px"></canvas></div>`;
  attachSort("tblMod");
  Chart.defaults.color="#8fa0c0"; Chart.defaults.borderColor="#2e3b58";
  new Chart(document.getElementById("cvModTrend"),{type:"line",
    data:{labels:lbl,datasets},
    options:{scales:{y:{ticks:{callback:v=>v+"%"}}}}});
}

// ---------- Levantamiento ----------
function renderLevantamiento(){
  const el=document.getElementById("tab-levantamiento");
  const allIslas=[...new Set(Object.values(state.master).map(m=>m.isla||"").filter(Boolean))].sort();
  if(!allIslas.length){
    el.innerHTML='<div class="card muted">Sin datos de islas. Carga el archivo cn primero.</div>';return;
  }
  const stored=document.getElementById("levSel")?.value||"";
  const sel=allIslas.includes(stored)?stored:allIslas[0];
  const machines=Object.entries(state.master)
    .filter(([,ms])=>(ms.isla||"")===sel)
    .sort(([a],[b])=>a.localeCompare(b,"es",{numeric:true}));
  // modelos conocidos (para radio buttons dinámicos)
  const knownMods=[...new Set(Object.values(state.master).map(m=>m.modelo||"").filter(Boolean))];
  if(!knownMods.includes("Advance"))knownMods.unshift("Advance");
  if(!knownMods.includes("Cashflow")&&!knownMods.includes("Advance"))knownMods.push("Cashflow");
  else if(!knownMods.includes("Cashflow"))knownMods.push("Cashflow");
  const modOpts=["Advance","Cashflow",...knownMods.filter(m=>m!=="Advance"&&m!=="Cashflow"),""];
  let rows="";
  for(const [mda,ms] of machines){
    const mod=ms.modelo||"";
    const radios=modOpts.map(v=>`<label><input type="radio" name="lev_${mda}" value="${v}" ${mod===v?"checked":""}> ${v||"—"}</label>`).join(" ");
    rows+=`<tr>
      <td class="left"><b>${mda}</b></td>
      <td class="left">${ms.juego||"—"}</td>
      <td class="left" style="font-size:10px">${ms.firm||"—"}</td>
      <td class="left lev-radio">${radios}</td>
    </tr>`;
  }
  const selOpts=allIslas.map(i=>`<option value="${i}" ${i===sel?"selected":""}>${i}</option>`).join("");
  el.innerHTML=`<div class="card"><h2>Levantamiento de modelos por isla</h2>
    <div class="row">
      <label class="fld">ISLA <select id="levSel" onchange="renderLevantamiento()">${selOpts}</select></label>
      <button class="btn sec" onclick="levSetAll('Advance')">Toda → Advance</button>
      <button class="btn sec" onclick="levSetAll('Cashflow')">Toda → Cashflow</button>
      <button class="btn" onclick="levGuardar()">💾 Guardar</button>
      <span id="levMsg" class="hint"></span>
    </div>
    <div class="tblWrap" style="max-height:72vh"><table id="tblLev">
      <thead><tr>
        <th class="left sortable">MDA</th>
        <th class="left sortable">Juego</th>
        <th class="left sortable">Firmware</th>
        <th class="left">Modelo</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
  attachSort("tblLev");
}
function levSetAll(modelo){
  document.querySelectorAll("input[type=radio][name^='lev_']").forEach(inp=>{
    inp.checked=(inp.value===modelo);
  });
}
function levGuardar(){
  document.querySelectorAll("input[type=radio][name^='lev_']:checked").forEach(inp=>{
    const mda=inp.name.replace("lev_","");
    if(state.master[mda]) state.master[mda].modelo=inp.value;
  });
  invalidate(); saveState();
  const msg=document.getElementById("levMsg");
  if(msg){ msg.textContent="✓ Guardado."; setTimeout(()=>{ if(msg)msg.textContent=""; },2000); }
}

// ---------- Denominaciones ----------
function renderDenos(){
  const el=document.getElementById("tab-denominaciones");
  if(!state.weekOrder.length){el.innerHTML='<div class="card muted">Sin datos.</div>';return;}
  const calcs=allCalcs(), w=state.weekOrder;
  let body="";
  for(const dn of DENOS){
    let tr=`<td class="left"><b>$${dn}</b></td>`;
    for(const d of w){
      let ac=0,re=0;
      for(const m of calcs[d].rows){ac+=m.acc[dn]||0;re+=m.rej[dn]||0;}
      const t=ac+re;
      tr+=`<td class="${t>0?pctClass(ac/t):''}">${t>0?fmtP(ac/t):"—"}</td><td>${fmtN(t)}</td>`;
    }
    body+=`<tr>${tr}</tr>`;
  }
  el.innerHTML=`<div class="card"><h2>Aceptación por denominación</h2>
    <div class="tblWrap"><table id="tblDeno">
      <thead>
        <tr><th class="left">Denominación</th>${w.map(d=>`<th colspan="2">${fmtKey(d)}</th>`).join("")}</tr>
        <tr><th></th>${w.map(()=>`<th class="sortable">%Acep</th><th class="sortable">Intentos</th>`).join("")}</tr>
      </thead><tbody>${body}</tbody></table></div>
    <div class="hint">Detecta problemas sistémicos por denominación (billete deteriorado, calibración, etc.)</div></div>`;
  attachSort("tblDeno");
}

// ---------- Buscador ----------
let busMDAVal="", busIslaVal="";
function busOnInput(field,val){
  if(field==="mda"){ busMDAVal=val; busIslaVal=""; }
  else { busIslaVal=val; busMDAVal=""; }
  renderBuscador(field);
}
function renderBuscador(focusField){
  const el=document.getElementById("tab-buscador");
  const calcs=state.weekOrder.length?allCalcs():{};
  let resMDA="", resIsla="";

  if(busMDAVal){
    const q=busMDAVal.trim();
    const allMdas=new Set(state.weekOrder.flatMap(d=>state.weeks[d].rows.map(r=>r.mda)));
    const hits=[...allMdas].filter(m=>m.includes(q)).slice(0,20);
    if(!hits.length) resMDA='<div class="card muted">Sin resultados para MDA.</div>';
    for(const mda of hits){
      const ms=state.master[mda]||{};
      let hist="";
      for(const d of state.weekOrder){
        const mm=calcs[d]?.rows.find(r=>r.mda===mda);
        if(mm&&mm.pct>0) hist+=`<td class="${pctClass(mm.pct)}">${fmtP(mm.pct)}<br><span class="muted">${fmtN(mm.total)}</span></td>`;
        else hist+=`<td class="muted">—</td>`;
      }
      resMDA+=`<div class="card"><h2>MDA ${mda}</h2>
        <div class="kpis">
          <div class="kpi"><div class="v" style="font-size:16px">${getLoc(mda)||"—"}</div><div class="l">ISLA</div></div>
          <div class="kpi"><div class="v" style="font-size:14px">${ms.modelo||"—"}</div><div class="l">Modelo</div></div>
          <div class="kpi"><div class="v" style="font-size:13px">${ms.firm||"—"}</div><div class="l">Firmware</div></div>
          <div class="kpi"><div class="v" style="font-size:14px">${ms.juego||"—"}</div><div class="l">Juego</div></div>
        </div>
        <div class="tblWrap" style="margin-top:8px;max-height:100px"><table>
          <thead><tr>${state.weekOrder.map(d=>`<th>${fmtKey(d)}</th>`).join("")}</tr></thead>
          <tbody><tr>${hist}</tr></tbody></table></div></div>`;
    }
  }

  if(busIslaVal){
    const q=busIslaVal.trim().toLowerCase();
    // islas que coinciden
    const islas=[...new Set(Object.values(state.master).map(m=>m.isla||"").filter(Boolean))]
      .filter(i=>i.toLowerCase().includes(q)).sort();
    if(!islas.length) resIsla='<div class="card muted">Sin resultados para ISLA.</div>';
    for(const isla of islas){
      const mdas=Object.entries(state.master).filter(([,ms])=>(ms.isla||"")===isla).map(([mda])=>mda);
      // promedio de la isla en cada semana
      let histHead="", histBody="";
      for(const d of state.weekOrder){
        const wRows=calcs[d]?.rows.filter(m=>mdas.includes(m.mda)&&m.pct>0&&m.total>0)||[];
        const islaAvg=wRows.length?avg(wRows.map(m=>m.pct)):null;
        histHead+=`<th>${fmtKey(d)}</th>`;
        histBody+=islaAvg!=null?`<td class="${pctClass(islaAvg)}"><b>${fmtP(islaAvg)}</b><br><span class="muted">${wRows.length} máq</span></td>`:`<td class="muted">—</td>`;
      }
      // tabla de máquinas de la isla
      let machRows="";
      for(const mda of mdas.sort((a,b)=>a.localeCompare(b,"es",{numeric:true}))){
        const ms=state.master[mda]||{};
        let hist="";
        for(const d of state.weekOrder){
          const mm=calcs[d]?.rows.find(r=>r.mda===mda);
          if(mm&&mm.pct>0) hist+=`<td class="${pctClass(mm.pct)}">${fmtP(mm.pct)}<br><span class="muted">${fmtN(mm.total)}</span></td>`;
          else hist+=`<td class="muted">—</td>`;
        }
        machRows+=`<tr><td class="left"><b>${mda}</b></td><td class="left">${ms.modelo||"—"}</td><td class="left" style="font-size:10px">${ms.firm||"—"}</td>${hist}</tr>`;
      }
      resIsla+=`<div class="card"><h2>ISLA ${isla} — ${mdas.length} máquinas</h2>
        <div class="hint" style="margin-bottom:6px">Promedio de la isla por semana:</div>
        <div class="tblWrap" style="max-height:60px;margin-bottom:8px"><table>
          <thead><tr>${histHead}</tr></thead><tbody><tr>${histBody}</tr></tbody></table></div>
        <div class="tblWrap" style="max-height:260px"><table id="tblIsla_${isla.replace(/-/g,'')}">
          <thead><tr><th class="left sortable">MDA</th><th class="left sortable">Modelo</th><th class="left sortable">Firm</th>${state.weekOrder.map(d=>`<th class="sortable">${fmtKey(d)}</th>`).join("")}</tr></thead>
          <tbody>${machRows}</tbody></table></div></div>`;
      // attach sort after render
      setTimeout(()=>attachSort(`tblIsla_${isla.replace(/-/g,'')}`),0);
    }
  }

  el.innerHTML=`<div class="card"><h2>Buscador</h2>
    <div class="grid2">
      <label class="fld">Buscar por MDA (número de máquina)
        <input id="busMDA" placeholder="Ej: 100020" value="${busMDAVal}"
          oninput="busOnInput('mda',this.value)" style="cursor:text;margin-top:4px"></label>
      <label class="fld">Buscar por ISLA (ubicación)
        <input id="busIsla" placeholder="Ej: 202 o 202-08" value="${busIslaVal}"
          oninput="busOnInput('isla',this.value)" style="cursor:text;margin-top:4px"></label>
    </div></div>${resMDA}${resIsla}`;

  // restaurar foco
  const fid=focusField==="isla"?"busIsla":"busMDA";
  const inp=document.getElementById(fid);
  if(inp){ const v=inp.value.length; inp.focus(); inp.setSelectionRange(v,v); }
}

// ---------- Admin ----------
function renderAdmin(){
  const el=document.getElementById("tab-admin"), p=state.params;
  el.innerHTML=`<div class="card"><h2>Parámetros de gravedad</h2>
    <p class="hint" style="margin-bottom:10px">Fórmula (igual al Excel):<br>
    <code>si % ≥ UmbralOK → 0 &nbsp;|&nbsp; Total×(1+LOG10(Total))×((UmbralOK−%)/UmbralOK)×(Total/PromTotal)×Mult</code><br>
    Mult = ×Crítico si % &lt; UmbCrítico · ×Medio si % &lt; UmbMedio · ×1 en otro caso</p>
    <div class="grid2">
      <div class="card"><h2>Umbrales</h2>
        <div class="row"><label class="fld">OK — verde si % ≥ <input id="p_thrOk" type="number" step="0.01" min="0" max="1" value="${p.thrOk}"></label></div>
        <div class="row"><label class="fld">Medio — amarillo si % ≥ <input id="p_thrMid" type="number" step="0.01" min="0" max="1" value="${p.thrMid}"></label></div>
        <div class="row"><label class="fld">Crítico — rojo si % &lt; <input id="p_thrCrit" type="number" step="0.01" min="0" max="1" value="${p.thrCrit}"></label></div>
      </div>
      <div class="card"><h2>Multiplicadores</h2>
        <div class="row"><label class="fld">×Medio (AK1) <input id="p_multMid" type="number" step="1" min="1" value="${p.multMid}"></label></div>
        <div class="row"><label class="fld">×Crítico (AM1) <input id="p_multCrit" type="number" step="1" min="1" value="${p.multCrit}"></label></div>
      </div>
      <div class="card"><h2>Cortes de badge (puntaje)</h2>
        <div class="row"><label class="fld">Medio ≥ <input id="p_sevMid" type="number" step="1" value="${p.sevMid}"></label></div>
        <div class="row"><label class="fld">Alto ≥ <input id="p_sevHigh" type="number" step="1" value="${p.sevHigh}"></label></div>
        <div class="row"><label class="fld">Urgente ≥ <input id="p_sevCrit" type="number" step="1" value="${p.sevCrit}"></label></div>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn" onclick="saveParams()">Guardar y recalcular</button>
      <button class="btn danger" onclick="resetParams()">Restaurar valores Excel</button>
      <span id="adminMsg" class="hint"></span>
    </div></div>`;
}
function saveParams(){
  const g=id=>Number(document.getElementById(id).value);
  state.params={thrOk:g("p_thrOk"),thrMid:g("p_thrMid"),thrCrit:g("p_thrCrit"),
    multMid:g("p_multMid"),multCrit:g("p_multCrit"),
    sevMid:g("p_sevMid"),sevHigh:g("p_sevHigh"),sevCrit:g("p_sevCrit")};
  invalidate(); saveState(); renderParamsBar();
  document.getElementById("adminMsg").textContent="✓ Guardado.";
}
function resetParams(){
  state.params={thrOk:0.85,thrMid:0.90,thrCrit:0.40,multMid:3,multCrit:30,sevMid:10,sevHigh:50,sevCrit:150};
  invalidate(); saveState(); renderAdmin(); renderParamsBar();
}

// ---------- Init ----------
function renderAll(){
  renderParamsBar(); renderLoadedInfo();
  showTab(activeTab);
}
(async function(){
  buildNav(); buildShells();
  await loadState();
  sortWeeks();
  renderAll();
  if(state.weekOrder.length) showTab("resumen"); else showTab("carga");
})();
</script>
